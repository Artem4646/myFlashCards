<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Pro Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #0d0d0f; 
            --card: #16161a; 
            --accent: #c8f04c; 
            --text: #ffffff; 
            --border: #2a2a35; 
            --danger: #ff4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        
        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        /* Стилі форми входу */
        .auth-box { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            text-align: center; 
            margin-top: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; 
            border-radius: 12px; border: 1px solid var(--border); 
            background: #000; color: #fff; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--accent); }
        
        .btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .btn-primary { background: var(--accent); color: #000; margin-top: 10px; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 12px; }

        /* Список папок */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .folder-item { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.2s;
        }
        .folder-item:hover { border-color: var(--accent); }
        .folder-name { font-weight: 600; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        
        .btn-del { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; padding: 5px; }
        .btn-del:hover { color: var(--danger); }

        .loader { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 5px 15px; 
            border-radius: 20px; font-size: 12px; font-weight: bold; 
            display: none; z-index: 1000;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading" class="loader">СИНХРОНІЗАЦІЯ...</div>

    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <h1 style="margin-bottom: 10px; font-size: 28px;">Flash Pro</h1>
            <p style="color: #888; margin-bottom: 25px;">Твій персональний словник у хмарі</p>
            
            <input type="email" id="email" placeholder="Електронна пошта">
            <input type="password" id="pass" placeholder="Пароль">
            
            <button class="btn btn-primary" onclick="handleAuth('login')">Увійти</button>
            <button class="btn btn-outline" onclick="handleAuth('reg')">Створити новий акаунт</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div>
                <h2 id="user-name">Мої модулі</h2>
                <p id="user-email" style="font-size: 12px; color: #666;"></p>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">Вихід</button>
        </div>

        <div id="folders-list">
            </div>

        <button class="btn btn-primary" style="margin-top:20px; height: 60px; font-size: 18px;" onclick="addFolder()">
            + Створити модуль
        </button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };

    // Ініціалізація
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    // Слідкуємо за станом входу
    auth.onAuthStateChanged(user => {
        toggleLoader(false);
        if (user) {
            currentUser = user;
            document.getElementById('user-email').innerText = user.email;
            showScreen('scr-main');
            loadFolders();
        } else {
            currentUser = null;
            showScreen('scr-auth');
        }
    });

    // Вхід та Реєстрація
    async function handleAuth(type) {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;

        if (!email || !pass) return alert("Будь ласка, заповніть всі поля");
        if (pass.length < 6) return alert("Пароль має бути не менше 6 символів");

        toggleLoader(true);
        try {
            if (type === 'reg') {
                await auth.createUserWithEmailAndPassword(email, pass);
                alert("Акаунт створено успішно!");
            } else {
                await auth.signInWithEmailAndPassword(email, pass);
            }
        } catch (e) {
            alert("Помилка: " + e.message);
            toggleLoader(false);
        }
    }

    function logout() {
        if(confirm("Вийти з акаунту?")) auth.signOut();
    }

    // Робота з папками (Firestore)
    async function addFolder() {
        const name = prompt("Введіть назву нового модуля (напр. 'English Verbs'):");
        if (!name || name.trim() === "") return;

        toggleLoader(true);
        try {
            // Створюємо папку в ПЕРСОНАЛЬНІЙ колекції юзера
            await db.collection('users').doc(currentUser.uid).collection('folders').add({
                name: name.trim(),
                createdAt: Date.now()
            });
            loadFolders();
        } catch (e) {
            alert("Не вдалося зберегти: " + e.message);
            toggleLoader(false);
        }
    }

    async function loadFolders() {
        toggleLoader(true);
        try {
            const snapshot = await db.collection('users')
                                     .doc(currentUser.uid)
                                     .collection('folders')
                                     .orderBy('createdAt', 'desc')
                                     .get();
            
            const list = document.getElementById('folders-list');
            list.innerHTML = '';

            if (snapshot.empty) {
                list.innerHTML = '<p style="text-align:center; color:#666; margin-top:20px;">У вас поки немає модулів. Створіть перший!</p>';
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'folder-item';
                div.innerHTML = `
                    <div class="folder-name"><span>📁</span> ${data.name}</div>
                    <button class="btn-del" onclick="deleteFolder('${doc.id}', event)">✕</button>
                `;
                div.onclick = () => alert("Тут буде відкриття карток для: " + data.name);
                list.appendChild(div);
            });
        } catch (e) {
            console.error(e);
        }
        toggleLoader(false);
    }

    async function deleteFolder(id, event) {
        event.stopPropagation(); // Щоб не спрацював клік по всій папці
        if (!confirm("Видалити цей модуль?")) return;

        toggleLoader(true);
        await db.collection('users').doc(currentUser.uid).collection('folders').doc(id).delete();
        loadFolders();
    }

    // Допоміжні функції
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleLoader(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
</script>

</body>
</html>
