<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flash Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #0d0d0f; --card: #1c1c1e; --accent: #c8f04c; 
            --text: #ffffff; --muted: #8e8e93; --border: #2c2c2e; 
            --danger: #ff453a; --success: #32d74b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); 
            min-height: 100vh; overflow-x: hidden;
            padding: 20px; padding-bottom: env(safe-area-inset-bottom);
        }

        /* UI Elements */
        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        input { 
            width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; 
            border: 1px solid var(--border); background: #000; color: #fff; 
            outline: none; font-size: 16px; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; 
            font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: #fff; border: 1px solid var(--border); }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        /* Folders & Cards List */
        .item-row { 
            background: var(--card); padding: 18px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
        }

        /* STUDY MODES */
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .mode-btn { 
            background: var(--card); border: 1px solid var(--border); padding: 25px 10px;
            border-radius: 20px; text-align: center; cursor: pointer; font-weight: 600;
        }

        /* SWIPE SYSTEM */
        .study-container { position: relative; height: 400px; width: 100%; perspective: 1000px; margin-top: 20px; }
        
        .swipe-card {
            position: absolute; width: 100%; height: 100%;
            background: var(--card); border-radius: 24px;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 700; text-align: center; padding: 30px;
            backface-visibility: hidden; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: none; cursor: grab; user-select: none;
        }
        
        .swipe-card.flipped { transform: rotateY(180deg); border-color: var(--accent); }
        
        .card-back {
            position: absolute; inset: 0; background: var(--card);
            border-radius: 22px; display: flex; align-items: center; 
            justify-content: center; transform: rotateY(180deg);
            backface-visibility: hidden; color: var(--accent);
        }

        /* Overlay Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(10px);
        }
        .modal { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; }

        .loader { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 800; display: none; z-index: 3000; box-shadow: 0 4px 15px rgba(200,240,76,0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading" class="loader">ОБНОВЛЕННЯ...</div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title" style="margin-bottom:10px"></h3>
            <div id="modal-body"></div>
            <div style="display:flex; gap:10px; margin-top:20px" id="modal-btns"></div>
        </div>
    </div>

    <div id="scr-auth" class="screen active">
        <div style="text-align:center; margin-top:60px;">
            <h1 style="font-size:3rem; letter-spacing:-2px; margin-bottom:30px">Flash<span style="color:var(--accent)">.</span></h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-primary" onclick="handleAuth('login')">Увійти</button>
            <button class="btn btn-secondary" style="margin-top:10px" onclick="handleAuth('reg')">Створити акаунт</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2>Мої модулі</h2>
            <button onclick="auth.signOut()" style="background:none; border:none; color:var(--muted); font-weight:600">Вийти</button>
        </div>
        <div id="folders-list"></div>
        <button class="btn btn-primary" onclick="promptAddFolder()" style="position:fixed; bottom:30px; left:20px; width:calc(100% - 40px); max-width:460px">+ Новий модуль</button>
    </div>

    <div id="scr-editor" class="screen">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px">
            <button onclick="showScreen('scr-main')" style="background:none; border:none; color:var(--accent); font-size:1.5rem">←</button>
            <h2 id="ed-title">Завантаження...</h2>
        </div>
        
        <div class="mode-grid" style="margin-bottom:25px">
            <div class="mode-btn" onclick="startStudy('flip')">🃏 Картки</div>
            <div class="mode-btn" onclick="startStudy('write')">⌨️ Письмо</div>
        </div>

        <div id="cards-list" style="padding-bottom:100px"></div>
        
        <button class="btn btn-primary" onclick="promptAddCard()" style="position:fixed; bottom:30px; left:20px; width:calc(100% - 40px); max-width:460px">+ Додати картку</button>
    </div>

    <div id="scr-study" class="screen">
        <button onclick="showScreen('scr-editor')" style="background:none; border:none; color:var(--muted); margin-bottom:20px">Закрити тренування</button>
        <div id="study-area"></div>
    </div>

<script>
    // --- CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let curFid = null, curCards = [], studyIdx = 0;

    // --- AUTH ---
    auth.onAuthStateChanged(user => {
        if(user) { showScreen('scr-main'); loadFolders(); }
        else { showScreen('scr-auth'); }
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return;
        toggleLoader(true);
        try {
            if(type === 'reg') await auth.createUserWithEmailAndPassword(e, p);
            else await auth.signInWithEmailAndPassword(e, p);
        } catch(err) { alert(err.message); }
        toggleLoader(false);
    }

    // --- NAVIGATION ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function toggleLoader(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }

    // --- MODALS ---
    function openModal({title, html, confirmText, onConfirm}) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-btns').innerHTML = `
            <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
            <button class="btn btn-primary" id="m-conf">${confirmText}</button>
        `;
        document.getElementById('m-conf').onclick = () => { onConfirm(); closeModal(); };
        overlay.style.display = 'flex';
    }
    const closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    // --- FOLDERS ---
    async function loadFolders() {
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const f = doc.data();
            const div = document.createElement('div');
            div.className = 'item-row';
            div.onclick = () => openFolder(doc.id, f.name);
            div.innerHTML = `<b>📁 ${f.name}</b> <span onclick="event.stopPropagation(); deleteFolder('${doc.id}')">✕</span>`;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    function promptAddFolder() {
        const html = `<input type="text" id="f-in" placeholder="Назва модуля" autocomplete="off">`;
        openModal({title: "Новий модуль", html, confirmText: "Створити", onConfirm: async () => {
            const name = document.getElementById('f-in').value;
            if(name) {
                await db.collection('users').doc(auth.currentUser.uid).collection('folders').add({ name, createdAt: Date.now() });
                loadFolders();
            }
        }});
    }

    async function deleteFolder(id) {
        if(confirm("Видалити весь модуль?")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).delete();
            loadFolders();
        }
    }

    // --- EDITOR ---
    async function openFolder(id, name) {
        curFid = id;
        document.getElementById('ed-title').innerText = name;
        showScreen('scr-editor');
        loadCards();
    }

    async function loadCards() {
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').orderBy('createdAt', 'desc').get();
        curCards = [];
        const list = document.getElementById('cards-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const c = doc.data();
            curCards.push({id: doc.id, ...c});
            list.innerHTML += `<div class="item-row">
                <div><div style="color:var(--accent); font-weight:700">${c.term}</div><div style="font-size:14px; color:var(--muted)">${c.def}</div></div>
                <span onclick="deleteCard('${doc.id}')" style="color:var(--danger)">✕</span>
            </div>`;
        });
        toggleLoader(false);
    }

    function promptAddCard() {
        const html = `<input type="text" id="c-w" placeholder="Термін"><input type="text" id="c-t" placeholder="Переклад">`;
        openModal({title: "Додати картку", html, confirmText: "Зберегти", onConfirm: async () => {
            const term = document.getElementById('c-w').value, def = document.getElementById('c-t').value;
            if(term && def) {
                await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({ term, def, createdAt: Date.now() });
                loadCards();
            }
        }});
    }

    async function deleteCard(id) {
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').doc(id).delete();
        loadCards();
    }

    // --- STUDY SYSTEM (SWIPE) ---
    function startStudy(mode) {
        if(curCards.length === 0) return alert("Спочатку додайте картки!");
        studyIdx = 0;
        showScreen('scr-study');
        renderStudyCard();
    }

    function renderStudyCard() {
        const area = document.getElementById('study-area');
        if(studyIdx >= curCards.length) {
            area.innerHTML = `<div style="text-align:center; padding-top:50px"><h2>Вітаю! 🎉</h2><p style="margin:20px 0; color:var(--muted)">Ви пройшли всі картки.</p><button class="btn btn-primary" onclick="showScreen('scr-editor')">Назад до модуля</button></div>`;
            return;
        }

        const c = curCards[studyIdx];
        area.innerHTML = `
            <div class="study-container">
                <div class="swipe-card" id="active-card">
                    <div class="card-front">${c.term}</div>
                    <div class="card-back">${c.def}</div>
                </div>
            </div>
            <p style="text-align:center; color:var(--muted); margin-top:40px; font-size:14px">Натисніть, щоб перевернути.<br>Свайп вправо — знаю, вліво — ні.</p>
        `;

        initSwipe(document.getElementById('active-card'));
    }

    function initSwipe(card) {
        let startX = 0, currentX = 0, isDragging = false;

        card.onclick = () => card.classList.toggle('flipped');

        card.ontouchstart = (e) => { startX = e.touches[0].clientX; isDragging = true; card.style.transition = 'none'; };

        card.ontouchmove = (e) => {
            if(!isDragging) return;
            currentX = e.touches[0].clientX - startX;
            let rotate = currentX / 10;
            card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg) ${card.classList.contains('flipped') ? 'rotateY(180deg)' : ''}`;
            
            // Візуальний зворотний зв'язок
            if(currentX > 50) card.style.borderColor = 'var(--success)';
            else if(currentX < -50) card.style.borderColor = 'var(--danger)';
            else card.style.borderColor = 'var(--border)';
        };

        card.ontouchend = () => {
            isDragging = false;
            card.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            
            if(Math.abs(currentX) > 120) {
                const direction = currentX > 0 ? 1000 : -1000;
                card.style.transform = `translateX(${direction}px) rotate(${direction/10}deg)`;
                if(window.navigator.vibrate) window.navigator.vibrate(20);
                setTimeout(() => { studyIdx++; renderStudyCard(); }, 200);
            } else {
                card.style.transform = card.classList.contains('flipped') ? 'rotateY(180deg)' : 'translateX(0) rotate(0)';
                card.style.borderColor = 'var(--border)';
            }
        };
    }
</script>

</body>
</html>
