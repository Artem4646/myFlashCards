<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flash</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface-h: #334155;
            --text: #f8fafc; --muted: #94a3b8; --accent: #818cf8;
            --border: #334155; --danger: #ef4444; --success: #22c55e;
            --radius: 20px;
        }
        body.light-theme {
            --bg: #f8fafc; --surface: #ffffff; --surface-h: #f1f5f9;
            --text: #0f172a; --muted: #64748b; --accent: #4f46e5; --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; transition: 0.3s; overflow-x: hidden; }

        header { max-width: 500px; margin: 0 auto; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

        .nav-bar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 450px; 
            background: var(--surface); padding: 8px; border-radius: 24px; border: 1px solid var(--border);
            display: none; gap: 5px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); z-index: 1000;
        }
        .nav-btn { flex: 1; padding: 14px 5px; border-radius: 18px; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { background: var(--bg); color: var(--accent); }

        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 20px; animation: fadeIn 0.3s ease-out; }
        .screen.active { display: block; }

        .input-ans { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 15px; outline: none; font-size: 1rem; transition: 0.2s; }
        .input-ans:focus { border-color: var(--accent); }

        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 18px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main.secondary { background: var(--surface-h); color: var(--text); }
        .btn-main.danger { background: var(--danger); }
        .btn-main.success { background: var(--success); }

        .side-picker { background: var(--surface); padding: 10px; border-radius: 18px; margin-bottom: 20px; display: flex; gap: 8px; border: 1px solid var(--border); }
        .side-option { flex: 1; padding: 10px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 0.8rem; font-weight: 700; color: var(--muted); transition: 0.2s; }
        .side-option.active { background: var(--accent); color: white; }

        .card-scene { width: 100%; height: 320px; perspective: 1000px; margin-bottom: 20px; position: relative; touch-action: none; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { 
            position: absolute; inset: 0; backface-visibility: hidden; border-radius: 32px; 
            display: flex; align-items: center; justify-content: center; padding: 30px; 
            background: var(--surface); text-align: center; font-size: 1.8rem; font-weight: 800; 
            border: 3px solid var(--border); transition: 0.3s;
        }
        .card-back { transform: rotateY(180deg); color: var(--accent); }

        .desktop-controls { display: none; gap: 15px; margin-top: 10px; }
        @media (min-width: 768px) { .desktop-controls { display: flex; } }

        .swipe-correct .card-face { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .swipe-wrong .card-face { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal { background: var(--surface); padding: 30px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-bar" style="position:fixed; top:0; height:4px; background:var(--accent); width:0%; transition:0.4s; z-index:4000;"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:12px;"></h3>
        <p id="m-body" style="margin-bottom:25px; color:var(--muted);"></p>
        <div id="m-btns"></div>
    </div>
</div>

<header>
    <div class="logo">Flash Pro</div>
    <div style="display:flex; gap:10px">
        <button class="nav-btn" style="padding:10px; border-radius: 50%; background: var(--surface);" onclick="toggleTheme()">🌓</button>
        <button id="logout-btn" class="nav-btn" style="padding:10px; border-radius: 50%; background: var(--surface); display:none" onclick="auth.signOut()">🚪</button>
    </div>
</header>

<div id="scr-auth" class="screen active">
    <div style="text-align:center; padding-top:40px">
        <h2>Вхід</h2>
        <input type="email" id="email" class="input-ans" placeholder="Email">
        <input type="password" id="pass" class="input-ans" placeholder="Пароль">
        <button class="btn-main" onclick="handleAuth()">Увійти</button>
    </div>
</div>

<div id="scr-folders" class="screen">
    <h2>Модулі</h2>
    <div id="folders-list"></div>
    <button class="btn-main" onclick="uiAddFolder()">+ Новий модуль</button>
</div>

<div id="scr-editor" class="screen">
    <h2>Редактор</h2>
    <div style="background:var(--surface); padding:20px; border-radius:var(--radius); margin-bottom:20px; border:1px solid var(--border)">
        <input type="text" id="in-w" class="input-ans" placeholder="Термін">
        <input type="text" id="in-t" class="input-ans" placeholder="Переклад">
        <button class="btn-main" onclick="addCard()">Додати</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu">
        <h2>Навчання</h2>
        <div class="side-picker">
            <div class="side-option active" id="s-term" onclick="setSide('term')">Термін</div>
            <div class="side-option" id="s-def" onclick="setSide('def')">Переклад</div>
            <div class="side-option" id="s-rand" onclick="setSide('rand')">Рандом</div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px">
            <div class="btn-main secondary" style="height:80px; flex-direction:column" onclick="startMode('flip')"><span>🃏</span>Картки</div>
            <div class="btn-main secondary" style="height:80px; flex-direction:column" onclick="startMode('learn')"><span>🧠</span>Заучування</div>
            <div class="btn-main secondary" style="height:80px; flex-direction:column" onclick="startMode('write')"><span>⌨️</span>Письмо</div>
            <div class="btn-main secondary" style="height:80px; flex-direction:column" onclick="startMode('test')"><span>📝</span>Тест</div>
        </div>
    </div>
    <div id="study-area" style="display:none">
        <div id="mode-container"></div>
    </div>
</div>

<nav id="nav-container" class="nav-bar">
    <button id="n-folders" class="nav-btn" onclick="nav('folders')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')">Вчити</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let curFid = null, deck = [], studyQueue = [], mistakes = [], idx = 0, currentMode = '', side = 'term', startX = 0;

    function setSide(s) {
        side = s;
        document.querySelectorAll('.side-option').forEach(o => o.classList.remove('active'));
        document.getElementById('s-' + s).classList.add('active');
    }

    auth.onAuthStateChanged(user => {
        if(user) { 
            document.getElementById('nav-container').style.display = 'flex'; 
            document.getElementById('logout-btn').style.display = 'block';
            nav('folders'); 
        }
        else {
            document.getElementById('nav-container').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
            showScreen('scr-auth');
        }
    });

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(e && p) await auth.signInWithEmailAndPassword(e, p);
    }

    function nav(s) {
        if(!curFid && (s==='editor'||s==='study')) return nav('folders');
        showScreen('scr-'+s);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('n-'+s)) document.getElementById('n-'+s).classList.add('active');
        if(s==='folders') loadFolders();
        if(s==='editor') loadCards();
        if(s==='study') { document.getElementById('study-menu').style.display='block'; document.getElementById('study-area').style.display='none'; }
    }

    async function loadFolders() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').get();
        const list = document.getElementById('folders-list'); list.innerHTML = '';
        snap.forEach(doc => list.innerHTML += `<div class="item-row" onclick="curFid='${doc.id}'; nav('study')"><b>${doc.data().name}</b></div>`);
    }

    async function loadCards() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        deck = []; snap.forEach(doc => deck.push({id: doc.id, ...doc.data()}));
        const list = document.getElementById('cards-list'); list.innerHTML = '';
        deck.forEach(c => list.innerHTML += `<div class="item-row">${c.term} — ${c.def}</div>`);
    }

    async function addCard() {
        const t = document.getElementById('in-w'), d = document.getElementById('in-t');
        if(t.value && d.value) {
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({term:t.value, def:d.value});
            t.value=''; d.value=''; loadCards();
        }
    }

    function startMode(m, useMistakes = false) {
        studyQueue = useMistakes ? [...mistakes] : [...deck];
        if(studyQueue.length < 1) return;
        currentMode = m; idx = 0; mistakes = [];
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        renderStep();
    }

    function renderStep() {
        const cont = document.getElementById('mode-container');
        if(idx >= studyQueue.length) {
            let html = `<h2>Готово! 🎉</h2>`;
            if(mistakes.length > 0) {
                html += `<p style="margin:20px 0; color:var(--muted)">Залишилося вивчити: ${mistakes.length}</p>
                         <button class="btn-main" onclick="startMode('${currentMode}', true)">Повторити помилки</button>`;
            }
            html += `<button class="btn-main secondary" style="margin-top:10px" onclick="nav('study')">До меню</button>`;
            cont.innerHTML = html;
            return;
        }
        
        const c = studyQueue[idx];
        let a = c.term, b = c.def;
        if(side === 'def') [a, b] = [b, a];
        if(side === 'rand' && Math.random() > 0.5) [a, b] = [b, a];

        if(currentMode === 'flip') {
            cont.innerHTML = `
                <div class="card-scene" id="swipe-zone">
                    <div class="card-inner" id="card-obj" onclick="this.classList.toggle('flipped')">
                        <div class="card-face">${a}</div>
                        <div class="card-face card-back">${b}</div>
                    </div>
                </div>
                <div class="desktop-controls">
                    <button class="btn-main danger" style="flex:1" onclick="handleFlipResult(false)">← Не знаю</button>
                    <button class="btn-main success" style="flex:1" onclick="handleFlipResult(true)">Знаю →</button>
                </div>
            `;
            initSwipe();
        } else if(currentMode === 'learn' || (currentMode === 'test' && Math.random() > 0.5)) {
            let options = [b, ...deck.filter(d => (side==='term'?d.def:d.term) !== b).map(d => side==='term'?d.def:d.term).sort(()=>Math.random()-0.5).slice(0,3)].sort(()=>Math.random()-0.5);
            cont.innerHTML = `
                <h2 style="text-align:center; margin-bottom:30px">${a}</h2>
                <div style="display:grid; gap:10px">
                    ${options.map(opt => `<button class="input-ans" style="margin:0; text-align:left" onclick="checkChoice('${opt}', '${b}')">${opt}</button>`).join('')}
                </div>
            `;
        } else {
            cont.innerHTML = `
                <h2 style="text-align:center; margin-bottom:20px">${a}</h2>
                <input type="text" id="q-input" class="input-ans" placeholder="Переклад..." autocomplete="off">
                <button class="btn-main" onclick="checkWrite('${b}')">Перевірити</button>
            `;
            setTimeout(() => document.getElementById('q-input').focus(), 150);
        }
    }

    function handleFlipResult(known) {
        if(!known) mistakes.push(studyQueue[idx]);
        const card = document.getElementById('card-obj');
        card.style.transition = '0.4s';
        card.style.transform = (known ? 'translateX(200px) rotate(20deg)' : 'translateX(-200px) rotate(-20deg)') + (card.classList.contains('flipped') ? ' rotateY(180deg)' : '');
        card.style.opacity = '0';
        setTimeout(() => { idx++; renderStep(); }, 300);
    }

    function checkChoice(user, cor) {
        if(user !== cor) {
            mistakes.push(studyQueue[idx]);
            openPopup("Неправильно", `Правильна відповідь: ${cor}`, () => { idx++; renderStep(); });
        } else {
            idx++; renderStep();
        }
    }

    function checkWrite(cor) {
        const val = document.getElementById('q-input').value.trim().toLowerCase();
        if(val === cor.toLowerCase()) { idx++; renderStep(); }
        else {
            mistakes.push(studyQueue[idx]);
            openPopup("Помилка", `Правильно: ${cor}`, () => { idx++; renderStep(); });
        }
    }

    function initSwipe() {
        const zone = document.getElementById('swipe-zone'), card = document.getElementById('card-obj');
        if(!zone) return;
        zone.addEventListener('touchstart', e => { startX = e.touches[0].clientX; card.style.transition = '0s'; });
        zone.addEventListener('touchmove', e => {
            let x = e.touches[0].clientX - startX;
            card.style.transform = `translateX(${x}px) rotate(${x/15}deg)` + (card.classList.contains('flipped') ? ' rotateY(180deg)' : '');
            zone.className = x > 50 ? 'card-scene swipe-correct' : (x < -50 ? 'card-scene swipe-wrong' : 'card-scene');
        });
        zone.addEventListener('touchend', e => {
            let x = e.changedTouches[0].clientX - startX;
            if(Math.abs(x) > 100) handleFlipResult(x > 0);
            else { card.style.transition = '0.3s'; card.style.transform = card.classList.contains('flipped') ? 'rotateY(180deg)' : ''; zone.className = 'card-scene'; }
        });
    }

    window.addEventListener('keydown', e => {
        if(currentMode === 'flip' && document.getElementById('study-area').style.display !== 'none') {
            if(e.key === 'ArrowLeft') handleFlipResult(false);
            if(e.key === 'ArrowRight') handleFlipResult(true);
            if(e.key === ' ') { e.preventDefault(); document.getElementById('card-obj').classList.toggle('flipped'); }
        }
    });

    function openPopup(t, b, cb) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerText = b;
        const c = document.getElementById('m-btns'); c.innerHTML = '';
        const btn = document.createElement('button'); btn.className="btn-main"; btn.innerText="ОК";
        btn.onclick = () => { document.getElementById('modal-overlay').style.display='none'; if(cb) cb(); };
        c.appendChild(btn); document.getElementById('modal-overlay').style.display='flex';
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>
</body>
</html>
