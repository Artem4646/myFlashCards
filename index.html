<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash Pro Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #0d0d0f; --card: #16161a; --accent: #c8f04c; 
            --text: #ffffff; --border: #2a2a35; --danger: #ff4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        
        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        .auth-box { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-primary { background: var(--accent); color: #000; margin-top: 10px; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 12px; }

        .folder-item, .card-item { 
            background: var(--card); padding: 20px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .folder-item:active { background: #1c1c22; }

        .loader { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; }
        
        .back-btn { background: none; border: none; color: var(--accent); cursor: pointer; margin-bottom: 20px; font-size: 16px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading" class="loader">ОБРОБКА...</div>

    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <h1 style="margin-bottom: 20px;">Flash Pro</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-primary" onclick="handleAuth('login')">Увійти</button>
            <button class="btn btn-outline" onclick="handleAuth('reg')">Створити акаунт</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Мої модулі</h2>
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer;">Вихід</button>
        </div>
        <div id="folders-list"></div>
        <button class="btn btn-primary" style="position: sticky; bottom: 20px;" onclick="addFolder()">+ Новий модуль</button>
    </div>

    <div id="scr-folder" class="screen">
        <button class="back-btn" onclick="showScreen('scr-main')">← Назад до модулів</button>
        <h2 id="current-folder-title" style="margin-bottom: 20px;">Назва папки</h2>
        <div id="cards-list"></div>
        <button class="btn btn-primary" onclick="addCard()">+ Додати картку</button>
    </div>

<script>
    // ==========================================
    // ВСТАВ СВІЙ КОНФІГ НИЖЧЕ
    // ==========================================
    const firebaseConfig = {
  apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
  authDomain: "pet-project-90af1.firebaseapp.com",
  projectId: "pet-project-90af1",
  storageBucket: "pet-project-90af1.firebasestorage.app",
  messagingSenderId: "408900485418",
  appId: "1:408900485418:web:450d1665212044352e9e53"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentFolderId = null;

    // Слідкуємо за станом входу
    auth.onAuthStateChanged(user => {
        toggleLoader(false);
        if (user) {
            showScreen('scr-main');
            loadFolders();
        } else {
            showScreen('scr-auth');
        }
    });

    // АВТЕНТИФІКАЦІЯ
    async function handleAuth(type) {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Заповни всі поля");
        toggleLoader(true);
        try {
            if(type === 'reg') await auth.createUserWithEmailAndPassword(email, pass);
            else await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) { alert(e.message); toggleLoader(false); }
    }

    function logout() { if(confirm("Вийти з акаунту?")) auth.signOut(); }

    // РОБОТА З ПАПКАМИ
    async function addFolder() {
        const name = prompt("Назва нового модуля:");
        if(!name) return;
        toggleLoader(true);
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').add({
            name: name, createdAt: Date.now()
        });
        loadFolders();
    }

    async function loadFolders() {
        toggleLoader(true);
        const snapshot = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list');
        list.innerHTML = '';
        
        snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'folder-item';
            div.onclick = () => openFolder(doc.id, data.name);
            div.innerHTML = `
                <div style="font-weight:bold;">📁 ${data.name}</div>
                <div style="display:flex; gap:15px;">
                    <button onclick="renameFolder('${doc.id}', '${data.name}', event)" style="background:none; border:none; cursor:pointer;">✏️</button>
                    <button onclick="deleteFolder('${doc.id}', event)" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                </div>
            `;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    function openFolder(id, name) {
        currentFolderId = id;
        document.getElementById('current-folder-title').innerText = name;
        showScreen('scr-folder');
        loadCards();
    }

    async function renameFolder(id, oldName, event) {
        event.stopPropagation();
        const newName = prompt("Нова назва:", oldName);
        if(!newName || newName === oldName) return;
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).update({ name: newName });
        loadFolders();
    }

    async function deleteFolder(id, event) {
        event.stopPropagation();
        if(!confirm("Видалити цей модуль та всі картки в ньому?")) return;
        toggleLoader(true);
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).delete();
        loadFolders();
    }

    // РОБОТА З КАРТКАМИ
    async function addCard() {
        const term = prompt("Слово (Термін):");
        const def = prompt("Переклад (Визначення):");
        if(!term || !def) return;
        
        toggleLoader(true);
        await db.collection('users').doc(auth.currentUser.uid)
                .collection('folders').doc(currentFolderId)
                .collection('cards').add({
                    term, def, createdAt: Date.now()
                });
        loadCards();
    }

    async function loadCards() {
        toggleLoader(true);
        const snapshot = await db.collection('users').doc(auth.currentUser.uid)
                                 .collection('folders').doc(currentFolderId)
                                 .collection('cards').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('cards-list');
        list.innerHTML = '';
        
        snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <div>
                    <div style="font-weight:bold; color:var(--accent);">${data.term}</div>
                    <div style="font-size:14px; color:#aaa;">${data.def}</div>
                </div>
                <button onclick="deleteCard('${doc.id}')" style="background:none; border:none; color:#444; cursor:pointer;">✕</button>
            `;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    async function deleteCard(cardId) {
        await db.collection('users').doc(auth.currentUser.uid)
                .collection('folders').doc(currentFolderId)
                .collection('cards').doc(cardId).delete();
        loadCards();
    }

    // ДОПОМІЖНІ
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleLoader(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
</script>
</body>
</html>
