<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlashCloud Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-h: rgba(51, 65, 85, 0.9);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-solid: #818cf8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 24px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body.light-theme {
            --bg: #f1f5f9;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-h: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --muted: #64748b;
            --accent: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --accent-solid: #4f46e5;
            --border: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; min-height: 100vh; transition: 0.4s; overflow-x: hidden; }

        header { max-width: 500px; margin: 0 auto; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 800; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 420px; background: var(--surface); padding: 8px; border-radius: 28px; border: 1px solid var(--border); display: none; gap: 8px; box-shadow: var(--shadow); z-index: 1000; backdrop-filter: blur(20px); }
        .nav-btn { flex: 1; padding: 12px 5px; border-radius: 20px; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 20px; animation: slideUp 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-ans { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 15px; outline: none; font-size: 1rem; transition: 0.3s; }
        .input-ans:focus { border-color: var(--accent-solid); background: var(--surface-h); }
        .input-ans.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .input-ans.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 22px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main.secondary { background: var(--surface-h); color: var(--text); border: 1px solid var(--border); }

        .item-row { background: var(--surface); padding: 20px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--border); transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }

        .side-picker { background: var(--surface); padding: 6px; border-radius: 20px; margin-bottom: 25px; display: flex; gap: 5px; border: 1px solid var(--border); }
        .side-option { flex: 1; padding: 10px; border-radius: 15px; cursor: pointer; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--muted); }
        .side-option.active { background: var(--bg); color: var(--accent-solid); }

        .study-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .study-card { background: var(--surface); padding: 30px 15px; border-radius: 28px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(12px); }
        .modal { background: var(--surface-h); padding: 35px; border-radius: 35px; width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:12px;"></h3>
        <p id="m-body" style="margin-bottom:20px; color:var(--muted);"></p>
        <div id="m-content"></div>
        <div id="m-btns" style="display:flex; gap:12px; margin-top:20px;"></div>
    </div>
</div>

<header>
    <div class="logo">FLASHCLOUD</div>
    <div style="display:flex; gap:12px">
        <button class="nav-btn" style="padding:12px; border-radius: 50%; background: var(--surface); width:45px; height:45px;" onclick="toggleTheme()">🌓</button>
        <button id="logout-btn" class="nav-btn" style="padding:12px; border-radius: 50%; background: var(--surface); width:45px; height:45px; display:none" onclick="auth.signOut()">🚪</button>
    </div>
</header>

<div id="scr-auth" class="screen active">
    <div style="text-align:center; padding-top:60px">
        <h2>Вхід</h2>
        <input type="email" id="email" class="input-ans" placeholder="Email">
        <input type="password" id="pass" class="input-ans" placeholder="Пароль">
        <button class="btn-main" onclick="handleAuth()">Продовжити</button>
        <p style="margin-top: 25px; color: var(--muted);" onclick="toggleAuthMode()">
            <span id="auth-switch">Ще немає акаунта? Створити</span>
        </p>
    </div>
</div>

<div id="scr-folders" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h2>Модулі</h2>
        <button class="btn-main" style="width:auto; padding:12px 20px" onclick="uiAddFolder()">+ Створити</button>
    </div>
    <div id="folders-list"></div>
</div>

<div id="scr-editor" class="screen">
    <h2 id="editor-title" style="margin-bottom: 25px;">Слова</h2>
    <div style="background:var(--surface); padding:20px; border-radius:25px; margin-bottom:30px; border:1px solid var(--border);">
        <input type="text" id="in-w" class="input-ans" placeholder="Термін">
        <input type="text" id="in-t" class="input-ans" placeholder="Переклад">
        <button class="btn-main" onclick="addCard()">Додати картку</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu">
        <h2 id="study-title">Навчання</h2>
        <div class="side-picker">
            <div class="side-option active" id="s-term" onclick="setSide('term')">Термін</div>
            <div class="side-option" id="s-def" onclick="setSide('def')">Переклад</div>
        </div>
        <div class="study-grid">
            <div class="study-card" onclick="startMode('flip')"><span>🃏</span><b>Картки</b></div>
            <div class="study-card" onclick="startMode('learn')"><span>🧠</span><b>Вибір</b></div>
            <div class="study-card" onclick="startMode('write')"><span>⌨️</span><b>Письмо</b></div>
        </div>
    </div>
    <div id="study-area" style="display:none">
        <div id="mode-container"></div>
    </div>
</div>

<nav id="nav-container" class="nav-bar">
    <button id="n-folders" class="nav-btn" onclick="nav('folders')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')">Вчити</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let curFid = null, deck = [], studyQueue = [], mistakes = [], idx = 0, side = 'term';
    let isLoginMode = true;

    auth.onAuthStateChanged(user => {
        if(user) { document.getElementById('nav-container').style.display = 'flex'; nav('folders'); }
        else { document.getElementById('nav-container').style.display = 'none'; showScreen('scr-auth'); }
    });

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-switch').innerText = isLoginMode ? "Ще немає акаунта? Створити" : "Вже є акаунт? Увійти";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value.trim(), p = document.getElementById('pass').value.trim();
        try { if(isLoginMode) await auth.signInWithEmailAndPassword(e, p); else await auth.createUserWithEmailAndPassword(e, p); }
        catch(err) { alert(err.message); }
    }

    async function loadFolders() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list'); list.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `<div class="item-row" onclick="selectFolder('${doc.id}', '${d.name}')">
                <b>${d.name}</b>
                <div style="display:flex; gap:10px">
                    <button class="nav-btn" style="padding:10px; background:var(--surface-h)" onclick="uiRenameFolder('${doc.id}', '${d.name.replace(/'/g, "\\'")}', event)">✏️</button>
                    <button class="nav-btn" style="padding:10px; background:var(--surface-h); color:var(--danger)" onclick="uiDeleteFolder('${doc.id}', event)">🗑️</button>
                </div>
            </div>`;
        });
    }

    async function selectFolder(id, name) {
        curFid = id; document.getElementById('editor-title').innerText = name;
        await loadCards(); nav('study');
    }

    async function loadCards() {
        if(!curFid) return;
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        deck = []; snap.forEach(doc => deck.push({id: doc.id, ...doc.data()}));
        const list = document.getElementById('cards-list'); list.innerHTML = '';
        deck.forEach(c => {
            list.innerHTML += `<div class="item-row">
                <div style="flex:1"><b>${c.term}</b> → ${c.def}</div>
                <div style="display:flex; gap:8px">
                    <button class="nav-btn" style="padding:10px; background:var(--surface-h)" onclick="uiEditCard('${c.id}', '${c.term.replace(/'/g, "\\'")}', '${c.def.replace(/'/g, "\\")}')">✏️</button>
                    <button class="nav-btn" style="padding:10px; background:var(--surface-h); color:var(--danger)" onclick="uiDeleteCard('${c.id}')">🗑️</button>
                </div>
            </div>`;
        });
    }

    async function addCard() {
        const t = document.getElementById('in-w'), d = document.getElementById('in-t');
        // Очищаємо пробіли перед збереженням
        const term = t.value.trim();
        const def = d.value.trim();
        
        if(term && def && curFid) {
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({term, def});
            t.value=''; d.value=''; loadCards();
        }
    }

    async function uiDeleteCard(cid) {
        if(confirm("Видалити цю картку?")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').doc(cid).delete();
            loadCards();
        }
    }

    function uiEditCard(cid, oldTerm, oldDef) {
        openModal("Редагувати слово", "", () => {
            const nt = document.getElementById('edit-term').value.trim();
            const nd = document.getElementById('edit-def').value.trim();
            if(nt && nd) {
                db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').doc(cid).update({term: nt, def: nd});
                closeModal(); loadCards();
            }
        }, true);
        document.getElementById('m-content').innerHTML = `
            <input type="text" id="edit-term" class="input-ans" value="${oldTerm}">
            <input type="text" id="edit-def" class="input-ans" value="${oldDef}">
        `;
    }

    function uiAddFolder() {
        const rawName = prompt("Назва модуля:");
        const name = rawName ? rawName.trim() : null;
        if(name) {
            db.collection('users').doc(auth.currentUser.uid).collection('folders').add({
                name, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadFolders();
        }
    }

    function uiRenameFolder(fid, oldName, e) {
        e.stopPropagation();
        const rawName = prompt("Нова назва модуля:", oldName);
        const newName = rawName ? rawName.trim() : null;
        if(newName && newName !== oldName) {
            db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(fid).update({name: newName});
            loadFolders();
        }
    }

    async function uiDeleteFolder(fid, e) {
        e.stopPropagation();
        if(confirm("Видалити цей модуль та всі слова в ньому?")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(fid).delete();
            loadFolders();
        }
    }

    function openModal(title, body, onConfirm, showCancel = false) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-body').innerText = body;
        const btns = document.getElementById('m-btns'); btns.innerHTML = '';
        
        if(showCancel) {
            const cBtn = document.createElement('button'); cBtn.className="btn-main secondary"; cBtn.innerText="Скасувати";
            cBtn.onclick = closeModal; btns.appendChild(cBtn);
        }
        
        const okBtn = document.createElement('button'); okBtn.className="btn-main"; okBtn.innerText="Зберегти";
        okBtn.onclick = onConfirm; btns.appendChild(okBtn);
        
        document.getElementById('modal-overlay').style.display='flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display='none'; document.getElementById('m-content').innerHTML=''; }

    function nav(s) {
        if(!curFid && (s==='editor'||s==='study')) return nav('folders');
        showScreen('scr-'+s);
        if(s==='folders') loadFolders();
        if(s==='editor') loadCards();
        if(s==='study') { document.getElementById('study-menu').style.display='block'; document.getElementById('study-area').style.display='none'; }
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function setSide(s) { side = s; document.querySelectorAll('.side-option').forEach(o => o.classList.remove('active')); document.getElementById('s-'+s).classList.add('active'); }

    function startMode(m) {
        studyQueue = [...deck].sort(() => 0.5 - Math.random());
        if(studyQueue.length < 1) return alert("Додайте слова!");
        idx = 0; mistakes = [];
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        renderStep(m);
    }

    function renderStep(m) {
        const cont = document.getElementById('mode-container');
        if(idx >= studyQueue.length) {
            cont.innerHTML = `<div style="text-align:center"><h2>🎉 Завершено!</h2><button class="btn-main" onclick="nav('study')">До меню</button></div>`;
            return;
        }
        const card = studyQueue[idx];
        const q = side === 'term' ? card.term : card.def;
        const a = side === 'term' ? card.def : card.term;

        if(m === 'learn') {
            let others = deck.map(d => side==='term'?d.def:d.term).filter(v => v !== a);
            let opts = [a, ...others.sort(() => 0.5 - Math.random()).slice(0, 3)].sort(() => 0.5 - Math.random());
            cont.innerHTML = `<h2>${q}</h2><div style="display:grid; gap:12px; margin-top:20px">
                ${opts.map(o => `<button class="input-ans" onclick="checkChoice(this, '${o.replace(/'/g, "\\'")}', '${a.replace(/'/g, "\\")}', '${m}')">${o}</button>`).join('')}
            </div>`;
        }
    }

    function checkChoice(btn, user, cor, m) {
        // Також робимо trim при перевірці, щоб випадковий пробіл не вважався помилкою
        if(user.trim() === cor.trim()) { 
            btn.classList.add('correct'); 
            setTimeout(() => { idx++; renderStep(m); }, 600); 
        } else { 
            btn.classList.add('wrong'); 
            setTimeout(() => { idx++; renderStep(m); }, 800); 
        }
    }
</script>
</body>
</html>
