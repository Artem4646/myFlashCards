<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flash Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0d0f">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #0d0d0f; --surface: #16161a; --surface-h: #1c1c21;
            --accent: #c8f04c; --text: #ffffff; --muted: #a1a1aa; 
            --border: #2a2a35; --danger: #ff4444; --success: #23b26d;
        }

        html { overflow: scroll; height: 100%; overflow-x: hidden; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); padding: 20px; 
            overflow-x: hidden; width: 100%; min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; max-width: 500px; margin-inline: auto; }
        .nav-bar { display: none; gap: 8px; max-width: 500px; margin: 0 auto 20px; }
        .nav-bar.visible { display: flex; }
        .nav-btn { 
            flex: 1; padding: 12px 5px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-weight: 600; font-size: 0.85rem; cursor: pointer;
        }
        .nav-btn.active { border-color: var(--accent); color: var(--accent); }

        .auth-box { background: var(--surface); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; font-size: 16px; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .item-row { 
            background: var(--surface); padding: 18px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px);
        }
        .modal { background: var(--surface); padding: 25px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; }

        /* --- НОВІ СТИЛІ ДЛЯ СВАЙПІВ КАРТОК --- */
        .study-area-wrapper { position: relative; width: 100%; height: 450px; }
        .card-scene { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 350px; perspective: 1000px; 
            margin-bottom: 20px; 
            will-change: transform; /* Оптимізація для телефонів */
        }
        .card-inner { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d; 
            transition: transform 0.1s linear, background-color 0.2s ease; /* Плавне повернення та перевертання */
            cursor: pointer; 
            border-radius: 24px;
            background: var(--surface); border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Класи, що додаються JavaScript при свайпі */
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.swiping-right { background-color: rgba(35, 178, 109, 0.2); border-color: var(--success); }
        .card-inner.swiping-left { background-color: rgba(255, 114, 94, 0.2); border-color: var(--danger); }
        
        /* Без анімації при перетягуванні пальцем */
        .card-inner.no-transition { transition: none !important; }
        
        /* Анімація вильоту картки */
        .card-inner.swipe-out-right { transform: translate(150%, 20px) rotate(30deg) !important; transition: transform 0.4s ease-out !important; opacity: 0; }
        .card-inner.swipe-out-left { transform: translate(-150%, 20px) rotate(-30deg) !important; transition: transform 0.4s ease-out !important; opacity: 0; }

        .card-face { 
            position: absolute; inset: 0; backface-visibility: hidden; border-radius: 24px; 
            display: flex; align-items: center; justify-content: center; padding: 30px;
            text-align: center; font-size: 1.8rem; font-weight: 700;
        }
        .card-back { transform: rotateY(180deg); color: var(--accent); }

        /* Підказки свайпів */
        .swipe-hint {
            position: absolute; bottom: -60px; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            color: var(--muted); font-size: 0.8rem; font-weight: 600;
            padding: 0 10px; opacity: 0.6;
        }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-card { background: var(--surface); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-weight: 600; }

        #loading { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; display: none; z-index: 3000; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 20px; border-radius: 50px; font-weight: 700; z-index: 2500; display: none; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="loading">ОБРОБКА...</div>
<div id="toast"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:10px"></h3>
        <p id="m-text" style="color:var(--muted); font-size:0.9rem; margin-bottom:15px"></p>
        <div id="m-body"></div>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
            <button class="btn btn-primary" id="m-confirm">ОК</button>
        </div>
    </div>
</div>

<header id="app-header" style="display:none">
    <h1 style="font-size: 1.4rem; color: var(--accent); cursor:pointer" onclick="nav('main')">Flash Pro</h1>
    <button onclick="logout()" style="background:none; border:none; color:var(--muted); font-weight:600">Вийти</button>
</header>

<div class="nav-bar" id="app-nav">
    <button id="n-main" class="nav-btn active" onclick="nav('main')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')">Вчити</button>
</div>

<div id="scr-auth" class="screen active">
    <div class="auth-box">
        <h1 style="margin-bottom: 20px;">Flash Pro</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn btn-primary" style="margin-bottom:10px" onclick="handleAuth('login')">Увійти</button>
        <button class="btn btn-secondary" onclick="handleAuth('reg')">Реєстрація</button>
    </div>
</div>

<div id="scr-main" class="screen">
    <div id="folders-list" style="margin-bottom: 20px;"></div>
    <button class="btn btn-primary" onclick="promptAddFolder()">+ Новий модуль</button>
</div>

<div id="scr-editor" class="screen">
    <h2 id="current-folder-title" style="margin-bottom: 15px; text-align:center">Модуль</h2>
    <div style="background:var(--surface); padding:15px; border-radius:20px; margin-bottom:20px; border:1px solid var(--border)">
        <input type="text" id="c-term" placeholder="Термін (English)" autocomplete="off">
        <input type="text" id="c-def" placeholder="Переклад (Українська)" autocomplete="off">
        <button class="btn btn-primary" onclick="addCard()">Додати слово</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu">
        <div class="mode-grid">
            <div class="mode-card" onclick="startMode('flip')">🃏<br>Картки</div>
            <div class="mode-card" onclick="startMode('learn')">🧠<br>Вибір</div>
            <div class="mode-card" onclick="startMode('write')">⌨️<br>Письмо</div>
            <div class="mode-card" onclick="startMode('test')">📝<br>Тест</div>
        </div>
    </div>
    <div id="study-area" style="display:none">
        <div id="mode-container" class="study-area-wrapper"></div>
    </div>
    <div id="study-result" style="display:none; text-align:center">
        <h2 id="res-title">🎉 Готово!</h2>
        <p id="res-desc" style="margin:15px 0; color:var(--muted)"></p>
        <button class="btn btn-primary" onclick="nav('study')">До режимів</button>
    </div>
</div>

<script>
    // КОНФІГУРАЦІЯ FIREBASE
    const firebaseConfig = {
  apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
  authDomain: "pet-project-90af1.firebaseapp.com",
  projectId: "pet-project-90af1",
  storageBucket: "pet-project-90af1.firebasestorage.app",
  messagingSenderId: "408900485418",
  appId: "1:408900485418:web:450d1665212044352e9e53"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let curFid = null, curFname = '', deck = [], idx = 0, mistakes = [], mode = '';

    const save = () => localStorage.setItem('quiz_final_v3', JSON.stringify(state));

    function nav(s) {
        window.scrollTo(0, 0);
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById('scr-' + s).classList.add('active');
        const btn = document.getElementById('n-' + s);
        if(btn) btn.classList.add('active');

        document.getElementById('n-editor').style.display = curFid ? 'block' : 'none';
        document.getElementById('n-study').style.display = curFid ? 'block' : 'none';

        if(s === 'main') loadFolders();
        if(s === 'editor') loadCards();
        if(s === 'study') {
            document.getElementById('study-menu').style.display = 'block';
            document.getElementById('study-area').style.display = 'none';
            document.getElementById('study-result').style.display = 'none';
        }
    }

    function showToast(m) { 
        const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; 
        setTimeout(() => t.style.display = 'none', 2000); 
    }
    function toggleLoader(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }
    
    function openModal({title, text, html, onConfirm}) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = text || "";
        document.getElementById('m-body').innerHTML = html || "";
        document.getElementById('m-confirm').onclick = () => { onConfirm(); closeModal(); };
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    async function loadFolders() {
        if(!auth.currentUser) return;
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div style="flex:1" onclick="curFid='${doc.id}'; curFname='${data.name}'; nav('editor')">
                    <b>${data.name}</b>
                </div>
                <div style="display:flex; gap:15px">
                    <span onclick="confirmDeleteFolder('${doc.id}', event)">✕</span>
                </div>`;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    function promptAddFolder() {
        const html = `<input type="text" id="f-name-in" placeholder="Назва модуля...">`;
        openModal({
            title: "Новий модуль",
            html: html,
            onConfirm: async () => {
                const name = document.getElementById('f-name-in').value.trim();
                if(!name) return;
                toggleLoader(true);
                await db.collection('users').doc(auth.currentUser.uid).collection('folders').add({
                    name, createdAt: Date.now()
                });
                loadFolders();
            }
        });
    }

    async function confirmDeleteFolder(id, e) {
        e.stopPropagation();
        if(confirm("Видалити цей модуль з усіма словами?")) {
            toggleLoader(true);
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).delete();
            if(curFid === id) curFid = null;
            loadFolders();
            nav('main');
        }
    }

    async function loadCards() {
        if(!curFid) return nav('main');
        document.getElementById('current-folder-title').innerText = curFname;
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('cards-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'card-item item-row';
            div.style.cursor = 'default';
            div.innerHTML = `<div><b>${data.term}</b><br><small style="color:var(--muted)">${data.def}</small></div>
                             <span onclick="deleteCard('${doc.id}')" style="color:var(--danger)">✕</span>`;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    async function addCard() {
        const term = document.getElementById('c-term').value.trim();
        const def = document.getElementById('c-def').value.trim();
        if(!term || !def) return showToast("Заповніть поля!");
        toggleLoader(true);
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({
            term, def, createdAt: Date.now()
        });
        document.getElementById('c-term').value = '';
        document.getElementById('c-def').value = '';
        loadCards();
    }

    async function deleteCard(id) {
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').doc(id).delete();
        loadCards();
    }

    async function startMode(m) {
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        deck = [];
        snap.forEach(doc => deck.push(doc.data()));
        toggleLoader(false);

        if(deck.length < 1) return showToast("Спочатку додайте слова!");
        
        mode = m; idx = 0; mistakes = [];
        deck.sort(() => Math.random() - 0.5);
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        showCurrentTask();
    }

    function showCurrentTask() {
        if(idx >= deck.length) return finishStudy();
        const c = deck[idx];
        const cont = document.getElementById('mode-container');
        cont.innerHTML = ''; // Очистка

        if(mode === 'flip') {
            cont.innerHTML = `
                <div class="card-scene" id="card-scene">
                    <div class="card-inner" id="card-inner">
                        <div class="card-face">${c.term}</div>
                        <div class="card-face card-back">${c.def}</div>
                    </div>
                </div>
                <div class="swipe-hint">
                    <span style="color:var(--danger)">← Не знаю</span>
                    <span style="color:var(--success)">Знаю →</span>
                </div>
                <p style="text-align:center; color:var(--muted); font-size:0.8rem; margin-top:10px">Натисніть, щоб перевернути</p>
                `;
            
            // Ініціалізація свайпів після створення DOM
            initCardSwipes();

        } else if(mode === 'learn' || mode === 'test') {
            let opts = [c.def];
            let allDefs = deck.map(d => d.def);
            while(opts.length < 4 && allDefs.length > opts.length) {
                let r = allDefs[Math.floor(Math.random()*allDefs.length)];
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            cont.innerHTML = `<h2 style="text-align:center; margin-bottom:30px; margin-top:50px;">${c.term}</h2>` + 
                opts.map(o => `<button class="btn btn-secondary" style="margin-bottom:12px; text-align:left; border-radius:18px" onclick="checkAnswer('${o}','${c.def}')">${o}</button>`).join('');
        } else if(mode === 'write') {
            cont.innerHTML = `
                <h2 style="text-align:center; margin-bottom:30px; margin-top:50px">${c.term}</h2>
                <input type="text" id="w-ans" placeholder="Переклад..." autocomplete="off">
                <button class="btn btn-primary" onclick="checkAnswer(document.getElementById('w-ans').value.trim(),'${c.def}')">Перевірити</button>`;
            setTimeout(() => document.getElementById('w-ans').focus(), 100);
        }
    }

    // --- ЛОГІКА СВАЙПІВ (TOUCH EVENTS) ---
    function initCardSwipes() {
        const cardInner = document.getElementById('card-inner');
        const cardScene = document.getElementById('card-scene');
        
        let startX = 0, currentX = 0, moveX = 0;
        let isPressed = false;

        // Натискання (Touch Start)
        cardScene.addEventListener('touchstart', (e) => {
            isPressed = true;
            startX = e.touches[0].clientX;
            cardInner.classList.add('no-transition'); // Вимикаємо анімацію при русі
        }, { passive: true });

        // Рух (Touch Move)
        cardScene.addEventListener('touchmove', (e) => {
            if (!isPressed) return;
            currentX = e.touches[0].clientX;
            moveX = currentX - startX;

            // Нахил та зміщення картки (сила нахилу 0.1)
            let rotation = moveX * 0.1; 
            cardInner.style.transform = `translate(${moveX}px, ${Math.abs(moveX)*0.1}px) rotate(${rotation}deg)`;
            
            // Якщо перевернута — додаємо rotateY(180) до трансформу
            if (cardInner.classList.contains('flipped')) {
                cardInner.style.transform += ` rotateY(180deg)`;
            }

            // Додавання кольору при свайпі
            if (moveX > 50) {
                cardInner.classList.add('swiping-right');
                cardInner.classList.remove('swiping-left');
            } else if (moveX < -50) {
                cardInner.classList.add('swiping-left');
                cardInner.classList.remove('swiping-right');
            } else {
                cardInner.classList.remove('swiping-right', 'swiping-left');
            }

        }, { passive: true });

        // Відпускання пальця (Touch End / Cancel)
        const handleEnd = () => {
            if (!isPressed) return;
            isPressed = false;
            cardInner.classList.remove('no-transition');

            // Threshold (поріг свайпу) = 1/3 ширини екрана
            const threshold = window.innerWidth / 3;

            if (moveX > threshold) {
                // Успішний свайп вправо (Знаю)
                cardInner.classList.add('swipe-out-right');
                setTimeout(() => nextSwiped(true), 300); // Чекаємо анімацію вильоту
            } else if (moveX < -threshold) {
                // Успішний свайп вліво (Не знаю)
                cardInner.classList.add('swipe-out-left');
                setTimeout(() => nextSwiped(false), 300);
            } else {
                // Занадто короткий свайп — пружинимо назад в центр
                cardInner.style.transform = '';
                if(cardInner.classList.contains('flipped')) cardInner.style.transform = 'rotateY(180deg)';
                cardInner.classList.remove('swiping-right', 'swiping-left');
            }
            moveX = 0; // Скидання
        };

        cardScene.addEventListener('touchend', handleEnd);
        cardScene.addEventListener('touchcancel', handleEnd);

        // Тап (натискання) для перевертання
        cardScene.addEventListener('click', (e) => {
            // Перевертаємо тільки якщо картка не була зміщена (це був тап, а не свайп)
            if (Math.abs(moveX) < 5) {
                cardInner.classList.toggle('flipped');
            }
        });
    }

    function nextSwiped(known) {
        if(!known) mistakes.push(deck[idx]);
        idx++;
        showCurrentTask();
    }

    // Логіка для інших режимів (не змінювалася)
    function checkAnswer(p, correct) {
        if(p.toLowerCase() === correct.toLowerCase()) {
            idx++; showCurrentTask();
        } else {
            showToast("Правильно: " + correct);
            mistakes.push(deck[idx]);
            idx++; showCurrentTask();
        }
    }

    function next(known) {
        if(!known) mistakes.push(deck[idx]);
        idx++; showCurrentTask();
    }

    function finishStudy() {
        document.getElementById('study-area').style.display = 'none';
        document.getElementById('study-result').style.display = 'block';
        const score = Math.round(((deck.length - mistakes.length) / deck.length) * 100);
        document.getElementById('res-desc').innerText = `Ви засвоїли ${score}% матеріалу (${deck.length - mistakes.length} з ${deck.length})`;
    }

    // AUTH
    function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return showToast("Введіть пошту та пароль");
        toggleLoader(true);
        if(type === 'reg') {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => { showToast(e.message); toggleLoader(false); });
        } else {
            auth.signInWithEmailAndPassword(email, pass).catch(e => { showToast(e.message); toggleLoader(false); });
        }
    }

    function logout() { auth.signOut(); curFid = null; }

</script>
</body>
</html>
