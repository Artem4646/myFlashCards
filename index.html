<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlashCloud Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-h: rgba(51, 65, 85, 0.9);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-solid: #818cf8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 24px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body.light-theme {
            --bg: #f1f5f9;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-h: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --muted: #64748b;
            --accent: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --accent-solid: #4f46e5;
            --border: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; min-height: 100vh; transition: 0.4s; overflow-x: hidden; }

        header { max-width: 500px; margin: 0 auto; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-size: 1.6rem; font-weight: 800; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 420px; background: var(--surface); padding: 8px; border-radius: 28px; border: 1px solid var(--border); display: none; gap: 8px; box-shadow: var(--shadow); z-index: 1000; backdrop-filter: blur(20px); }
        .nav-btn { flex: 1; padding: 12px 5px; border-radius: 20px; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 20px; animation: slideUp 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-ans { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 15px; outline: none; font-size: 1rem; transition: 0.3s; cursor: pointer; }
        .input-ans:focus { border-color: var(--accent-solid); background: var(--surface-h); }
        .input-ans.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; transform: scale(1.02); }
        .input-ans.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 22px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main.secondary { background: var(--surface-h); color: var(--text); border: 1px solid var(--border); }

        .item-row { background: var(--surface); padding: 20px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .side-picker { background: var(--surface); padding: 6px; border-radius: 20px; margin-bottom: 25px; display: flex; gap: 5px; border: 1px solid var(--border); }
        .side-option { flex: 1; padding: 10px; border-radius: 15px; cursor: pointer; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--muted); }
        .side-option.active { background: var(--bg); color: var(--accent-solid); }

        .study-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .study-card { background: var(--surface); padding: 30px 15px; border-radius: 28px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }

        .card-scene { width: 100%; height: 380px; perspective: 1200px; margin-bottom: 30px; position: relative; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 40px; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 38px; display: flex; align-items: center; justify-content: center; padding: 35px; background: var(--surface); text-align: center; font-size: 1.8rem; font-weight: 800; border: 2px solid var(--border); box-shadow: var(--shadow); }
        .card-back { transform: rotateY(180deg); background: var(--accent); color: white; border: none; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(12px); }
        .modal { background: var(--surface-h); padding: 35px; border-radius: 35px; width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:12px;"></h3>
        <p id="m-body" style="margin-bottom:25px; color:var(--muted);"></p>
        <div id="m-btns"></div>
    </div>
</div>

<header>
    <div class="logo">FLASHCLOUD</div>
    <div style="display:flex; gap:12px">
        <button class="nav-btn" style="padding:12px; border-radius: 50%; background: var(--surface); width:45px; height:45px;" onclick="toggleTheme()">🌓</button>
        <button id="logout-btn" class="nav-btn" style="padding:12px; border-radius: 50%; background: var(--surface); width:45px; height:45px; display:none" onclick="auth.signOut()">🚪</button>
    </div>
</header>

<div id="scr-auth" class="screen active">
    <div style="text-align:center; padding-top:60px">
        <h2 id="auth-title">Вхід</h2>
        <input type="email" id="email" class="input-ans" style="cursor:text" placeholder="Email">
        <input type="password" id="pass" class="input-ans" style="cursor:text" placeholder="Пароль">
        <button class="btn-main" onclick="handleAuth()">Продовжити</button>
        <p style="margin-top: 20px; color: var(--muted);" onclick="toggleAuthMode()">
            <span id="auth-switch">Ще немає акаунта? Створити</span>
        </p>
    </div>
</div>

<div id="scr-folders" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h2>Модулі</h2>
        <button class="btn-main" style="width:auto; padding:12px 20px" onclick="uiAddFolder()">+ Створити</button>
    </div>
