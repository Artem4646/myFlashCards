<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flash Pro Cloud</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d0f">
    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3820/3820150.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3820/3820150.png">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #0d0d0f; --card: #16161a; --accent: #c8f04c; 
            --text: #ffffff; --border: #2a2a35; --danger: #ff4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding: 20px; overflow-x: hidden; padding-bottom: env(safe-area-inset-bottom); }
        
        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        .auth-box { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; font-size: 16px; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 12px; }

        .folder-item, .card-item { 
            background: var(--card); padding: 20px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal {
            background: var(--card); padding: 25px; border-radius: 24px;
            border: 1px solid var(--border); width: 100%; max-width: 400px;
            text-align: center; animation: scaleUp 0.2s ease;
        }
        .modal h3 { margin-bottom: 15px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }

        .loader { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: none; z-index: 3000; }
        .back-btn { background: none; border: none; color: var(--accent); cursor: pointer; margin-bottom: 20px; font-size: 16px; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading" class="loader">ОБРОБКА...</div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal" id="modal-content">
            <h3 id="modal-title">Заголовок</h3>
            <p id="modal-text" style="color:#aaa; font-size:14px; margin-bottom:15px;"></p>
            <div id="modal-input-container"></div>
            <div class="modal-buttons" id="modal-btns"></div>
        </div>
    </div>

    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <h1 style="margin-bottom: 10px;">Flash Pro</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn btn-primary" onclick="handleAuth('login')">Увійти</button>
            <button class="btn btn-outline" onclick="handleAuth('reg')">Реєстрація</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Мої модулі</h2>
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer;">Вийти</button>
        </div>
        <div id="folders-list"></div>
        <button class="btn btn-primary" onclick="promptAddFolder()">+ Новий модуль</button>
    </div>

    <div id="scr-folder" class="screen">
        <button class="back-btn" onclick="showScreen('scr-main')">← Назад</button>
        <h2 id="current-folder-title" style="margin-bottom: 20px;">Папка</h2>
        <div id="cards-list"></div>
        <button class="btn btn-primary" onclick="promptAddCard()">+ Додати картку</button>
    </div>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
  authDomain: "pet-project-90af1.firebaseapp.com",
  projectId: "pet-project-90af1",
  storageBucket: "pet-project-90af1.firebasestorage.app",
  messagingSenderId: "408900485418",
  appId: "1:408900485418:web:450d1665212044352e9e53"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentFolderId = null;

    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
        auth.onAuthStateChanged(user => {
            toggleLoader(false);
            if (user) { showScreen('scr-main'); loadFolders(); }
            else { showScreen('scr-auth'); }
        });
    });

    function showModal({ title, text, html, confirmText, confirmClass, onConfirm }) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text || "";
        const inputCont = document.getElementById('modal-input-container');
        inputCont.innerHTML = html || "";
        
        const btnCont = document.getElementById('modal-btns');
        btnCont.innerHTML = `
            <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
            <button class="btn ${confirmClass || 'btn-primary'}" id="modal-confirm-btn">${confirmText || 'OK'}</button>
        `;
        
        document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); };
        overlay.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // ПАПКИ
    function promptAddFolder() {
        const html = `<input type="text" id="f-name" placeholder="Назва модуля..." autocomplete="off">`;
        showModal({
            title: "Новий модуль",
            html: html,
            confirmText: "Створити",
            onConfirm: async () => {
                const name = document.getElementById('f-name').value;
                if(name) {
                    toggleLoader(true);
                    await db.collection('users').doc(auth.currentUser.uid).collection('folders').add({ name, createdAt: Date.now() });
                    closeModal();
                    loadFolders();
                }
            }
        });
    }

    async function loadFolders() {
        toggleLoader(true);
        const snapshot = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list');
        list.innerHTML = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'folder-item';
            div.onclick = () => openFolder(doc.id, data.name);
            div.innerHTML = `<div>📁 ${data.name}</div><button onclick="confirmDeleteFolder('${doc.id}', event)" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:18px;">✕</button>`;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    // КАРТКИ - ВИПРАВЛЕНО
    function promptAddCard() {
        const html = `
            <input type="text" id="c-term" placeholder="Слово (напр. Apple)" autocomplete="off">
            <input type="text" id="c-def" placeholder="Переклад (напр. Яблуко)" autocomplete="off">
        `;
        showModal({
            title: "Додати картку",
            html: html,
            confirmText: "Зберегти",
            onConfirm: async () => {
                const term = document.getElementById('c-term').value;
                const def = document.getElementById('c-def').value;
                if(term && def) {
                    toggleLoader(true);
                    await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(currentFolderId).collection('cards').add({
                        term, def, createdAt: Date.now()
                    });
                    closeModal();
                    loadCards();
                }
            }
        });
    }

    async function loadCards() {
        toggleLoader(true);
        const snapshot = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(currentFolderId).collection('cards').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('cards-list');
        list.innerHTML = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `<div><div style="font-weight:bold; color:var(--accent);">${data.term}</div><div>${data.def}</div></div>
            <button onclick="deleteCard('${doc.id}')" style="background:none; border:none; color:#444; font-size:18px;">✕</button>`;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    // ІНШЕ
    function openFolder(id, name) { currentFolderId = id; document.getElementById('current-folder-title').innerText = name; showScreen('scr-folder'); loadCards(); }
    async function deleteCard(id) { await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(currentFolderId).collection('cards').doc(id).delete(); loadCards(); }
    async function confirmDeleteFolder(id, event) {
        event.stopPropagation();
        if(confirm("Видалити модуль?")) {
            toggleLoader(true);
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).delete();
            loadFolders();
        }
    }
    function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        toggleLoader(true);
        if(type==='reg') auth.createUserWithEmailAndPassword(email, pass).catch(e=>alert(e.message));
        else auth.signInWithEmailAndPassword(email, pass).catch(e=>alert(e.message));
    }
    function logout() { auth.signOut(); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleLoader(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
</script>
</body>
</html>
