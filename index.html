<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizlet Master</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a092d; --surface: #2e3856; --surface-h: #3c4a7d;
  --text: #ffffff; --muted: #d9dde8; --accent: #4255ff;
  --border: #303545; --danger: #ff725e; --success: #23b26d;
}
body.light-theme {
  --bg: #f6f7fb; --surface: #ffffff; --surface-h: #edeff4;
  --text: #1a1d28; --muted: #586380; --accent: #4255ff;
  --border: #d9dde8;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; padding-bottom: 80px; }

/* Навігація */
.header { max-width: 800px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); cursor: pointer; }
.nav-bar { display: flex; gap: 10px; max-width: 800px; margin: 0 auto 25px; }
.nav-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; background: var(--surface); color: var(--text); font-weight: 600; cursor: pointer; border-bottom: 4px solid var(--border); transition: 0.2s; }
.nav-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

/* Режими */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.mode-card { background: var(--surface); padding: 15px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border); text-align: center; }
.mode-card:hover { border-color: var(--accent); }

.screen { display: none; width: 100%; max-width: 650px; margin: 0 auto; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Картки */
.card-scene { width: 100%; height: 300px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
.card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.5s; }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 25px; background: var(--surface); text-align: center; font-size: 1.5rem; font-weight: 600; border: 1px solid var(--border); }
.card-back { transform: rotateY(180deg); border-color: var(--accent); color: var(--accent); }

/* Тести та Заучування */
.option-btn { width: 100%; padding: 15px; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 8px; cursor: pointer; text-align: left; font-size: 1rem; }
.option-btn:hover { border-color: var(--accent); }
.option-btn.correct { border-color: var(--success); background: rgba(35, 178, 109, 0.1); }
.option-btn.wrong { border-color: var(--danger); background: rgba(255, 114, 94, 0.1); }

.input-ans { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 15px; outline: none; font-size: 1.1rem; }

.pbar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--accent); transition: 0.3s; width: 0%; }

.btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
.item-row { background: var(--surface); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="location.reload()">Quizlet</div>
  <div style="display:flex; gap:10px">
    <button class="nav-btn" style="padding:5px 10px" onclick="exportData()">⬇️</button>
    <button class="nav-btn" style="padding:5px 10px" onclick="importData()">⬆️</button>
    <button class="nav-btn" style="padding:5px 10px" onclick="toggleTheme()">🌓</button>
  </div>
</header>

<div class="nav-bar">
  <button id="n-folders" class="nav-btn active" onclick="nav('folders')">Модулі</button>
  <button id="n-editor" class="nav-btn" onclick="nav('editor')" style="display:none">Редактор</button>
  <button id="n-study" class="nav-btn" onclick="nav('study')" style="display:none">Вчити</button>
</div>

<div id="scr-folders" class="screen active">
  <div id="folders-list"></div>
  <button class="btn-main" onclick="addFolder()">+ Новий навчальний модуль</button>
</div>

<div id="scr-editor" class="screen">
  <h2 id="ed-name" style="margin-bottom:15px"></h2>
  <div style="background:var(--surface); padding:15px; border-radius:12px; margin-bottom:15px">
    <input type="text" id="in-w" class="input-ans" placeholder="Термін" style="font-size:0.9rem">
    <input type="text" id="in-t" class="input-ans" placeholder="Переклад" style="font-size:0.9rem">
    <button class="btn-main" onclick="addCard()">Додати картку</button>
  </div>
  <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
  <div id="study-menu">
    <h3 style="margin-bottom:15px">Оберіть режим:</h3>
    <div class="mode-grid">
      <div class="mode-card" onclick="startMode('flip')">🃏<br>Картки</div>
      <div class="mode-card" onclick="startMode('learn')">🧠<br>Заучування</div>
      <div class="mode-card" onclick="startMode('write')">⌨️<br>Письмо</div>
      <div class="mode-card" onclick="startMode('test')">📝<br>Тест</div>
    </div>
  </div>

  <div id="study-area" style="display:none">
    <div class="pbar"><div id="pbar-fill" class="pbar-fill"></div></div>
    
    <div id="m-flip" class="mode-content">
      <div class="card-scene" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
        <div class="card-inner">
          <div class="card-face" id="q-flip"></div>
          <div class="card-face card-back" id="a-flip"></div>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <button class="option-btn" style="text-align:center" onclick="next(false)">🛑 Не знаю</button>
        <button class="option-btn" style="text-align:center" onclick="next(true)">✅ Знаю</button>
      </div>
    </div>

    <div id="m-learn" class="mode-content" style="display:none">
      <div style="text-align:center; margin-bottom:20px"><small>Оберіть правильний переклад:</small><h2 id="q-learn"></h2></div>
      <div id="learn-options"></div>
    </div>

    <div id="m-write" class="mode-content" style="display:none">
      <h2 id="q-write" style="text-align:center; margin-bottom:20px"></h2>
      <input type="text" id="write-in" class="input-ans" placeholder="Введіть відповідь...">
      <button class="btn-main" onclick="checkWrite()">Відповісти</button>
      <div id="write-msg" style="margin-top:15px; text-align:center; font-weight:bold"></div>
    </div>

    <div id="m-test" class="mode-content" style="display:none">
       <div id="test-q-container"></div>
    </div>
  </div>

  <div id="study-result" style="display:none; text-align:center">
    <h2 id="res-title">Чудово!</h2>
    <p id="res-desc" style="margin:15px 0; color:var(--muted)"></p>
    <button class="btn-main" onclick="nav('study')">До режимів</button>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('quiz_v5')) || { folders: [], cards: {}, theme: 'dark' };
let curFid = null, deck = [], idx = 0, mistakes = [], mode = '';

function save() { localStorage.setItem('quiz_v5', JSON.stringify(state)); }

function nav(s) {
  document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('scr-'+s).classList.add('active');
  document.getElementById('n-'+s).classList.add('active');
  document.getElementById('n-editor').style.display = curFid ? 'block' : 'none';
  document.getElementById('n-study').style.display = curFid ? 'block' : 'none';
  if(s === 'folders') renderFolders();
  if(s === 'editor') renderEditor();
  if(s === 'study') {
    document.getElementById('study-menu').style.display = 'block';
    document.getElementById('study-area').style.display = 'none';
    document.getElementById('study-result').style.display = 'none';
  }
}

// FOLDERS
function renderFolders() {
  const list = document.getElementById('folders-list');
  list.innerHTML = state.folders.map(f => `
    <div class="item-row" onclick="curFid='${f.id}'; nav('editor')">
      <span><b>${f.name}</b> (${(state.cards[f.id]||[]).length})</span>
      <span>❱</span>
    </div>
  `).join('');
}
function addFolder() {
  const n = prompt("Назва модуля:");
  if(!n) return;
  const id = 'f'+Date.now();
  state.folders.push({id, name: n});
  state.cards[id] = [];
  save(); renderFolders();
}

// EDITOR
function renderEditor() {
  document.getElementById('ed-name').textContent = state.folders.find(f => f.id === curFid).name;
  const list = document.getElementById('cards-list');
  list.innerHTML = state.cards[curFid].map(c => `
    <div class="item-row">
      <span>${c.w} — ${c.t}</span>
      <span style="color:var(--danger); cursor:pointer" onclick="delCard(${c.id})">✕</span>
    </div>
  `).reverse().join('');
}
function addCard() {
  const w = document.getElementById('in-w').value.trim(), t = document.getElementById('in-t').value.trim();
  if(!w || !t) return;
  state.cards[curFid].push({id: Date.now(), w, t});
  save(); renderEditor();
  document.getElementById('in-w').value = ''; document.getElementById('in-t').value = '';
}
function delCard(id) {
  state.cards[curFid] = state.cards[curFid].filter(c => c.id !== id);
  save(); renderEditor();
}

// STUDY MODES
function startMode(m) {
  mode = m;
  deck = [...state.cards[curFid]].sort(() => Math.random() - 0.5);
  idx = 0; mistakes = [];
  document.getElementById('study-menu').style.display = 'none';
  document.getElementById('study-area').style.display = 'block';
  showCard();
}

function showCard() {
  if(idx >= deck.length) return finish();
  document.getElementById('pbar-fill').style.width = (idx / deck.length * 100) + '%';
  
  document.querySelectorAll('.mode-content').forEach(c => c.style.display = 'none');
  const c = deck[idx];

  if(mode === 'flip') {
    document.getElementById('m-flip').style.display = 'block';
    document.getElementById('q-flip').textContent = c.w;
    document.getElementById('a-flip').textContent = c.t;
  } 
  else if(mode === 'learn') {
    document.getElementById('m-learn').style.display = 'block';
    document.getElementById('q-learn').textContent = c.w;
    const opts = [c.t];
    while(opts.length < 4 && state.cards[curFid].length >= 4) {
      const r = state.cards[curFid][Math.floor(Math.random()*state.cards[curFid].length)].t;
      if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    document.getElementById('learn-options').innerHTML = opts.map(o => `
      <button class="option-btn" onclick="checkLearn('${o}', '${c.t}')">${o}</button>
    `).join('');
  }
  else if(mode === 'write') {
    document.getElementById('m-write').style.display = 'block';
    document.getElementById('q-write').textContent = c.w;
    document.getElementById('write-in').value = '';
    document.getElementById('write-msg').textContent = '';
  }
  else if(mode === 'test') {
    document.getElementById('m-test').style.display = 'block';
    renderTestQuestion();
  }
}

function next(correct) {
  if(!correct) mistakes.push(deck[idx]);
  idx++; showCard();
}

// LEARN LOGIC
function checkLearn(picked, correct) {
  if(picked === correct) {
    idx++; showCard();
  } else {
    alert("Помилка! Правильно: " + correct);
    mistakes.push(deck[idx]);
    idx++; showCard();
  }
}

// WRITE LOGIC
function checkWrite() {
  const ans = document.getElementById('write-in').value.trim().toLowerCase();
  const correct = deck[idx].t.toLowerCase();
  if(ans === correct) {
    idx++; showCard();
  } else {
    document.getElementById('write-msg').innerHTML = `<span style="color:var(--danger)">Помилка.</span> Правильно: ${deck[idx].t}`;
    mistakes.push(deck[idx]);
    setTimeout(() => { idx++; showCard(); }, 2000);
  }
}

// TEST LOGIC
function renderTestQuestion() {
  const c = deck[idx];
  const container = document.getElementById('test-q-container');
  // Випадково вибираємо тип питання: 0 - вибір, 1 - письмо
  const type = Math.random() > 0.5 ? 'choice' : 'write';
  
  if(type === 'choice') {
    const opts = [c.t];
    while(opts.length < 4 && state.cards[curFid].length >= 4) {
        const r = state.cards[curFid][Math.floor(Math.random()*state.cards[curFid].length)].t;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    container.innerHTML = `<h3>Як перекладається "${c.w}"?</h3><br>` + opts.map(o => `
      <button class="option-btn" onclick="checkLearn('${o}', '${c.t}')">${o}</button>
    `).join('');
  } else {
    container.innerHTML = `<h3>Напишіть переклад: "${c.w}"</h3><br>
      <input type="text" id="test-in" class="input-ans">
      <button class="btn-main" onclick="const a=document.getElementById('test-in').value; checkLearn(a.trim().toLowerCase(), '${c.t.toLowerCase()}')">Відповісти</button>`;
  }
}

function finish() {
  document.getElementById('study-area').style.display = 'none';
  document.getElementById('study-result').style.display = 'block';
  const score = Math.round(((deck.length - mistakes.length) / deck.length) * 100);
  document.getElementById('res-title').textContent = score > 70 ? "Відмінно!" : "Треба ще повчити";
  document.getElementById('res-desc').textContent = `Ваш результат: ${score}% (${deck.length - mistakes.length} з ${deck.length})`;
}

// THEME & DATA
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.className = state.theme === 'light' ? 'light-theme' : '';
  save();
}
function exportData() {
  const data = JSON.stringify(state);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'quizlet_backup.json'; a.click();
}
function importData() {
  const input = document.createElement('input'); input.type = 'file';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => { state = JSON.parse(ev.target.result); save(); location.reload(); };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

// INIT
if(state.theme === 'light') document.body.className = 'light-theme';
renderFolders();
</script>
</body>
</html>
