<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlashCloud Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0a092d; --surface: #2e3856; --surface-h: #3c4a7d;
            --text: #ffffff; --muted: #d9dde8; --accent: #c8f04c;
            --border: #303545; --danger: #ff725e; --success: #23b26d;
        }
        body.light-theme {
            --bg: #f6f7fb; --surface: #ffffff; --surface-h: #edeff4;
            --text: #1a1d28; --muted: #586380; --accent: #4255ff; --border: #d9dde8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); padding: 15px; min-height: 100vh; transition: 0.3s; overflow-x: hidden; }

        header { max-width: 600px; margin: 0 auto 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; cursor: pointer; }

        .nav-bar { display: none; gap: 8px; max-width: 600px; margin: 0 auto 15px; }
        .nav-btn { 
            flex: 1; padding: 12px 5px; border-radius: 12px; border: none; 
            background: var(--surface); color: var(--text); font-weight: 600; 
            font-size: 0.8rem; cursor: pointer; border-bottom: 3px solid var(--border); 
        }
        .nav-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

        .screen { display: none; width: 100%; max-width: 600px; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }

        /* MODALS */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center;
            justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--surface); padding: 25px; border-radius: 24px;
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-ans { 
            width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--border); 
            background: var(--bg); color: var(--text); margin-bottom: 12px; outline: none; font-size: 16px;
            transition: 0.2s;
        }
        .input-ans:focus { border-color: var(--accent); }

        .btn-main { 
            width: 100%; padding: 16px; background: var(--accent); color: #000; 
            border: none; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-main.secondary { background: var(--border); color: var(--text); }

        .item-row { 
            background: var(--surface); padding: 18px; border-radius: 16px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border); cursor: pointer;
        }

        /* CARD STYLES */
        .card-scene { width: 100%; height: 320px; perspective: 1000px; margin-bottom: 25px; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { 
            position: absolute; inset: 0; backface-visibility: hidden; border-radius: 28px; 
            display: flex; align-items: center; justify-content: center; 
            padding: 30px; background: var(--surface); text-align: center; font-size: 1.8rem; 
            font-weight: 700; border: 2px solid var(--border);
        }
        .card-back { transform: rotateY(180deg); color: var(--accent); border-color: var(--accent); }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-card { background: var(--surface); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-weight: 700; transition: 0.2s; }
        .mode-card:hover { border-color: var(--accent); background: var(--surface-h); }

        #loading-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent); transition: 0.4s; z-index: 2000; width: 0%; }

        /* PROGRESS BAR FOR LEARN MODE */
        .learn-progress-wrap { height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #learn-bar-inner { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-bar"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:10px"></h3>
        <div id="m-body"></div>
        <div style="display:flex; gap:10px; margin-top:15px" id="m-btns"></div>
    </div>
</div>

<header>
    <div class="logo" onclick="nav('folders')">FLASHCLOUD</div>
    <div style="display:flex; gap:8px">
        <button class="nav-btn" style="padding:8px 12px; display:block" onclick="toggleTheme()">🌓</button>
        <button id="logout-btn" class="nav-btn" style="padding:8px 12px; display:none" onclick="auth.signOut()">🚪</button>
    </div>
</header>

<div id="nav-container" class="nav-bar">
    <button id="n-folders" class="nav-btn active" onclick="nav('folders')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')">Вчити</button>
</div>

<div id="scr-auth" class="screen active">
    <div style="text-align:center; padding-top:60px">
        <h1 style="margin-bottom:10px">Привіт! 👋</h1>
        <p style="color:var(--muted); margin-bottom:30px">Увійдіть, щоб синхронізувати картки</p>
        <input type="email" id="email" class="input-ans" placeholder="Електронна пошта">
        <input type="password" id="pass" class="input-ans" placeholder="Пароль">
        <button class="btn-main" onclick="handleAuth('login')">Увійти</button>
        <button class="btn-main secondary" style="margin-top:12px" onclick="handleAuth('reg')">Створити акаунт</button>
    </div>
</div>

<div id="scr-folders" class="screen">
    <h2 style="margin-bottom:20px">Ваші модулі</h2>
    <div id="folders-list" style="margin-bottom:20px"></div>
    <button class="btn-main" onclick="addFolder()">+ Створити новий модуль</button>
</div>

<div id="scr-editor" class="screen">
    <div style="background:var(--surface); padding:20px; border-radius:24px; margin-bottom:20px; border:1px solid var(--border)">
        <h3 style="margin-bottom:15px">Додати нове слово</h3>
        <input type="text" id="in-w" class="input-ans" placeholder="Термін (напр. Apple)">
        <input type="text" id="in-t" class="input-ans" placeholder="Переклад (напр. Яблуко)">
        <button class="btn-main" onclick="addCard()">Додати в список</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu" class="mode-grid">
        <div class="mode-card" onclick="startMode('flip')"><span style="font-size:2rem">🃏</span><br>Картки</div>
        <div class="mode-card" onclick="startMode('learn')"><span style="font-size:2rem">🧠</span><br>Заучування</div>
        <div class="mode-card" onclick="startMode('write')"><span style="font-size:2rem">⌨️</span><br>Письмо</div>
        <div class="mode-card" onclick="startMode('test')"><span style="font-size:2rem">📝</span><br>Тест</div>
    </div>

    <div id="study-area" style="display:none">
        <div class="learn-progress-wrap" id="learn-progress-container" style="display:none">
            <div id="learn-bar-inner"></div>
        </div>
        <div id="mode-container"></div>
    </div>
</div>

<script>
    // КОНФІГУРАЦІЯ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let curFid = null, deck = [], idx = 0, learnQueue = [], currentMode = '';

    // AUTH
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('nav-container').style.display = 'flex';
            document.getElementById('logout-btn').style.display = 'block';
            nav('folders');
        } else {
            document.getElementById('nav-container').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
            showScreen('scr-auth');
        }
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Заповніть поля");
        setLoad(30);
        try {
            if(type === 'reg') await auth.createUserWithEmailAndPassword(e, p);
            else await auth.signInWithEmailAndPassword(e, p);
            setLoad(100);
        } catch(err) { alert(err.message); setLoad(0); }
    }

    // NAVIGATION
    function nav(s) {
        if((s === 'editor' || s === 'study') && !curFid) {
            alert("Спочатку виберіть модуль!");
            return nav('folders');
        }
        showScreen('scr-' + s);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('n-' + s)) document.getElementById('n-' + s).classList.add('active');

        if(s === 'folders') loadFolders();
        if(s === 'editor') loadCards();
        if(s === 'study') {
            document.getElementById('study-menu').style.display = 'grid';
            document.getElementById('study-area').style.display = 'none';
        }
    }

    // FOLDERS LOGIC
    async function loadFolders() {
        setLoad(40);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const f = doc.data();
            list.innerHTML += `
                <div class="item-row" onclick="curFid='${doc.id}'; nav('study')">
                    <div><b>${f.name}</b></div>
                    <div style="display:flex; gap:15px">
                        <span onclick="event.stopPropagation(); deleteFolder('${doc.id}')">🗑️</span>
                    </div>
                </div>`;
        });
        setLoad(100);
    }

    function addFolder() {
        const name = prompt("Назва модуля:");
        if(name) {
            db.collection('users').doc(auth.currentUser.uid).collection('folders').add({ name, createdAt: Date.now() })
            .then(() => loadFolders());
        }
    }

    async function deleteFolder(id) {
        if(confirm("Видалити модуль?")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).delete();
            loadFolders();
        }
    }

    // CARDS LOGIC
    async function loadCards() {
        setLoad(40);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        const list = document.getElementById('cards-list');
        deck = [];
        list.innerHTML = '';
        snap.forEach(doc => {
            const c = doc.data();
            deck.push({id: doc.id, ...c});
            list.innerHTML += `<div class="item-row">
                <span><b>${c.term}</b> — ${c.def}</span>
                <span style="color:var(--danger)" onclick="deleteCard('${doc.id}')">✕</span>
            </div>`;
        });
        setLoad(100);
    }

    async function addCard() {
        const term = document.getElementById('in-w').value, def = document.getElementById('in-t').value;
        if(!term || !def) return;
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({ term, def, createdAt: Date.now() });
        document.getElementById('in-w').value = ''; document.getElementById('in-t').value = '';
        loadCards();
    }

    async function deleteCard(cid) {
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').doc(cid).delete();
        loadCards();
    }

    // STUDY MODES
    function startMode(m) {
        if(deck.length < 1) return alert("Додайте хоча б одну картку!");
        currentMode = m;
        idx = 0;
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        
        if(m === 'learn') {
            document.getElementById('learn-progress-container').style.display = 'block';
            learnQueue = [...deck].sort(() => Math.random() - 0.5);
            renderLearn();
        } else {
            document.getElementById('learn-progress-container').style.display = 'none';
            renderStep();
        }
    }

    // LEARN MODE (Advanced)
    function renderLearn() {
        if(learnQueue.length === 0) {
            alert("Модуль вивчено! 🎉");
            return nav('study');
        }
        const c = learnQueue[0];
        const cont = document.getElementById('mode-container');
        
        const progress = ((deck.length - learnQueue.length) / deck.length) * 100;
        document.getElementById('learn-bar-inner').style.width = progress + '%';

        let opts = [c.def];
        let others = deck.map(d => d.def).filter(d => d !== c.def);
        others.sort(() => Math.random() - 0.5);
        opts.push(...others.slice(0, 3));
        opts.sort(() => Math.random() - 0.5);

        cont.innerHTML = `
            <div style="text-align:center; margin-bottom:30px">
                <p style="color:var(--muted); font-size:0.9rem">ТЕРМІН</p>
                <h1 style="font-size:2.2rem; margin-top:10px">${c.term}</h1>
            </div>
            <div style="display:grid; gap:12px">
                ${opts.map(o => `<button class="input-ans" style="margin:0; text-align:left" onclick="checkLearnAns(this, '${o}', '${c.def}')">${o}</button>`).join('')}
            </div>`;
    }

    function checkLearnAns(btn, selected, correct) {
        const btns = document.querySelectorAll('#mode-container .input-ans');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.style.borderColor = 'var(--success)';
            btn.style.background = 'rgba(35, 178, 109, 0.1)';
            setTimeout(() => { learnQueue.shift(); renderLearn(); }, 600);
        } else {
            btn.style.borderColor = 'var(--danger)';
            btn.style.background = 'rgba(255, 114, 94, 0.1)';
            btns.forEach(b => { if(b.innerText === correct) b.style.borderColor = 'var(--success)'; });
            setTimeout(() => {
                const missed = learnQueue.shift();
                learnQueue.push(missed);
                renderLearn();
            }, 1500);
        }
    }

    // OTHER MODES (FLIP, WRITE, TEST)
    function renderStep() {
        if(idx >= deck.length) { alert("Чудова робота!"); return nav('study'); }
        const c = deck[idx];
        const cont = document.getElementById('mode-container');
        
        if(currentMode === 'flip') {
            cont.innerHTML = `
                <div class="card-scene" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-face">${c.term}</div>
                        <div class="card-face card-back">${c.def}</div>
                    </div>
                </div>
                <button class="btn-main" onclick="idx++; renderStep()">Далі →</button>`;
        } else if(currentMode === 'write' || currentMode === 'test') {
            cont.innerHTML = `<h2 style="text-align:center; margin-bottom:25px">${c.term}</h2>
                <input type="text" id="q-input" class="input-ans" placeholder="Переклад..." autocomplete="off">
                <button class="btn-main" onclick="processWrite('${c.def}')">Перевірити</button>`;
            setTimeout(() => document.getElementById('q-input').focus(), 100);
        }
    }

    function processWrite(correct) {
        const user = document.getElementById('q-input').value.trim().toLowerCase();
        if(user === correct.toLowerCase()) {
            idx++; renderStep();
        } else {
            alert("Правильно: " + correct);
            idx++; renderStep();
        }
    }

    // UTIL
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function setLoad(p) { 
        document.getElementById('loading-bar').style.width = p + '%'; 
        if(p===100) setTimeout(()=> document.getElementById('loading-bar').style.width = '0%', 500); 
    }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>

</body>
</html>
