<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flash Pro Live</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0d0f">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --bg: #0d0d0f; --surface: #16161a; --surface-h: #1c1c21;
            --accent: #c8f04c; --text: #ffffff; --muted: #a1a1aa; 
            --border: #2a2a35; --danger: #ff4444; --success: #23b26d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); padding: 20px; 
            overflow-x: hidden; width: 100%; min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-bar { display: none; gap: 8px; margin-bottom: 20px; }
        .nav-bar.visible { display: flex; }
        
        .nav-btn { 
            flex: 1; padding: 12px 5px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-weight: 600; font-size: 0.85rem; cursor: pointer;
        }
        .nav-btn.active { border-color: var(--accent); color: var(--accent); }

        .auth-box { background: var(--surface); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; outline: none; font-size: 16px; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--border); color: #fff; }

        .item-row { 
            background: var(--surface); padding: 18px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- КАРТКИ --- */
        .study-area-wrapper { position: relative; width: 100%; height: 420px; }
        .card-scene { position: absolute; width: 100%; height: 350px; perspective: 1000px; touch-action: none; }
        .card-inner { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--surface); border: 1px solid var(--border); border-radius: 28px;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face { 
            position: absolute; inset: 0; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; 
            padding: 30px; text-align: center; font-size: 1.6rem; font-weight: 700; 
        }
        .card-back { transform: rotateY(180deg); color: var(--accent); }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mode-card { background: var(--surface); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-weight: 600; }

        #loading { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; display: none; z-index: 9999; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 50px; font-weight: 700; display: none; z-index: 9999; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="loading">ОБРОБКА...</div>
<div id="toast"></div>

<header id="app-header" style="display:none">
    <h1 style="font-size: 1.3rem; color: var(--accent); cursor: pointer" onclick="nav('main')">Flash Pro</h1>
    <button onclick="logout()" style="background:none; border:none; color:var(--muted); font-weight:600">Вийти</button>
</header>

<div class="nav-bar" id="app-nav">
    <button id="n-main" class="nav-btn" onclick="nav('main')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')" style="display:none">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')" style="display:none">Вчити</button>
</div>

<div id="scr-auth" class="screen active">
    <div class="auth-box">
        <h1 style="margin-bottom: 25px;">Flash Pro</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn btn-primary" style="margin-bottom:12px" onclick="handleAuth('login')">Увійти</button>
        <button class="btn btn-secondary" onclick="handleAuth('reg')">Створити акаунт</button>
    </div>
</div>

<div id="scr-main" class="screen">
    <div id="folders-list"></div>
    <button class="btn btn-primary" onclick="addFolder()" style="margin-top:15px">+ Новий модуль</button>
</div>

<div id="scr-editor" class="screen">
    <h2 id="f-title" style="margin-bottom:15px; text-align:center"></h2>
    <div style="background:var(--surface); padding:20px; border-radius:24px; border:1px solid var(--border); margin-bottom:20px">
        <input type="text" id="c-term" placeholder="Термін (English)">
        <input type="text" id="c-def" placeholder="Переклад (UA)">
        <button class="btn btn-primary" onclick="addCard()">Додати слово</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu">
        <div class="mode-grid">
            <div class="mode-card" onclick="startMode('flip')">🃏<br>Картки</div>
            <div class="mode-card" onclick="startMode('learn')">🧠<br>Вибір</div>
        </div>
    </div>
    <div id="study-area" style="display:none">
        <div id="mode-container" class="study-area-wrapper"></div>
    </div>
    <div id="study-result" style="display:none; text-align:center">
        <h2>🎉 Завершено!</h2>
        <p id="res-info" style="margin:15px 0; color:var(--muted)"></p>
        <button class="btn btn-primary" onclick="nav('study')">До вибору режимів</button>
    </div>
</div>

<script>
    // --- КОНФІГУРАЦІЯ FIREBASE ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let curFid = null, curFname = '', deck = [], idx = 0;

    // --- СЛУХАЧ АВТОРИЗАЦІЇ ---
    auth.onAuthStateChanged(user => {
        toggleLoader(false);
        if (user) {
            document.getElementById('scr-auth').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').classList.add('visible');
            nav('main');
        } else {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-auth').classList.add('active');
            document.getElementById('app-header').style.display = 'none';
            document.getElementById('app-nav').classList.remove('visible');
        }
    });

    function nav(s) {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.getElementById('scr-' + s).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('n-' + s)) document.getElementById('n-' + s).classList.add('active');

        if(s === 'main') loadFolders();
        if(s === 'editor') loadCards();
        if(s === 'study') {
            document.getElementById('study-menu').style.display = 'block';
            document.getElementById('study-area').style.display = 'none';
            document.getElementById('study-result').style.display = 'none';
        }

        document.getElementById('n-editor').style.display = curFid ? 'block' : 'none';
        document.getElementById('n-study').style.display = curFid ? 'block' : 'none';
    }

    // --- ЛОГІКА ПАПОК (МОДУЛІВ) ---
    async function loadFolders() {
        if(!auth.currentUser) return;
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('folders-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const f = doc.data();
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div style="flex:1" onclick="openFolder('${doc.id}', '${f.name}')"><b>${f.name}</b></div>
                <span onclick="deleteFolder('${doc.id}')" style="color:var(--danger)">✕</span>
            `;
            list.appendChild(div);
        });
        toggleLoader(false);
    }

    async function addFolder() {
        const name = prompt("Назва модуля:");
        if(!name) return;
        toggleLoader(true);
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').add({
            name, createdAt: Date.now()
        });
        loadFolders();
    }

    function openFolder(id, name) {
        curFid = id;
        curFname = name;
        nav('editor');
    }

    async function deleteFolder(id) {
        if(!confirm("Видалити модуль?")) return;
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(id).delete();
        loadFolders();
    }

    // --- ЛОГІКА СЛІВ ---
    async function loadCards() {
        document.getElementById('f-title').innerText = curFname;
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').orderBy('createdAt', 'desc').get();
        const list = document.getElementById('cards-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const c = doc.data();
            const div = document.createElement('div');
            div.className = 'item-row';
            div.style.cursor = 'default';
            div.innerHTML = `<div><b>${c.term}</b><br><small style="color:var(--muted)">${c.def}</small></div>
                             <span onclick="deleteCard('${doc.id}')">✕</span>`;
            list.appendChild(div);
        });
    }

    async function addCard() {
        const term = document.getElementById('c-term').value;
        const def = document.getElementById('c-def').value;
        if(!term || !def) return;
        toggleLoader(true);
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({
            term, def, createdAt: Date.now()
        });
        document.getElementById('c-term').value = '';
        document.getElementById('c-def').value = '';
        loadCards();
        toggleLoader(false);
    }

    async function deleteCard(id) {
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').doc(id).delete();
        loadCards();
    }

    // --- НАВЧАННЯ ---
    async function startMode(m) {
        toggleLoader(true);
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        deck = [];
        snap.forEach(doc => deck.push(doc.data()));
        toggleLoader(false);

        if(deck.length < 1) return alert("Спочатку додайте слова!");
        
        idx = 0;
        deck.sort(() => Math.random() - 0.5);
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        showTask(m);
    }

    function showTask(m) {
        if(idx >= deck.length) {
            document.getElementById('study-area').style.display = 'none';
            document.getElementById('study-result').style.display = 'block';
            document.getElementById('res-info').innerText = `Ви пройшли ${deck.length} слів`;
            return;
        }

        const c = deck[idx];
        const cont = document.getElementById('mode-container');
        
        if(m === 'flip') {
            cont.innerHTML = `
                <div class="card-scene" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-face">${c.term}</div>
                        <div class="card-face card-back">${c.def}</div>
                    </div>
                </div>
                <div style="position:absolute; bottom:0; width:100%; display:flex; gap:10px">
                    <button class="btn btn-secondary" onclick="idx++; showTask('flip')">Наступне</button>
                </div>
            `;
        } else {
            // Режим вибору
            let options = [c.def];
            let others = deck.filter(d => d.def !== c.def).map(d => d.def);
            while(options.length < 4 && others.length > 0) {
                let r = Math.floor(Math.random() * others.length);
                options.push(others.splice(r, 1)[0]);
            }
            options.sort(() => Math.random() - 0.5);

            cont.innerHTML = `<h2 style="text-align:center; margin-bottom:30px">${c.term}</h2>` + 
                options.map(o => `<button class="btn btn-secondary" style="margin-bottom:10px" onclick="check('${o}','${c.def}')">${o}</button>`).join('');
        }
    }

    function check(pick, correct) {
        if(pick === correct) {
            idx++; showTask('learn');
        } else {
            showToast("Неправильно!");
        }
    }

    // --- AUTH ACTIONS ---
    function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Заповніть поля");
        toggleLoader(true);
        if(type === 'reg') {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => { alert(e.message); toggleLoader(false); });
        } else {
            auth.signInWithEmailAndPassword(email, pass).catch(e => { alert(e.message); toggleLoader(false); });
        }
    }

    function logout() { auth.signOut(); }
    function toggleLoader(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }
    function showToast(m) { 
        const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display='none', 2000);
    }
</script>

</body>
</html>
