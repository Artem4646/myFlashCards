<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlashCloud Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-h: rgba(51, 65, 85, 0.9);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-solid: #818cf8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 24px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body.light-theme {
            --bg: #f1f5f9;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-h: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --muted: #64748b;
            --accent: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --accent-solid: #4f46e5;
            --border: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.1), transparent);
            color: var(--text); padding-bottom: 110px; min-height: 100vh; transition: 0.4s; overflow-x: hidden; 
        }

        header { max-width: 500px; margin: 0 auto; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 800; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 420px; background: var(--surface); padding: 8px; border-radius: 28px; border: 1px solid var(--border); display: none; gap: 8px; box-shadow: var(--shadow); z-index: 1000; backdrop-filter: blur(20px); }
        .nav-btn { flex: 1; padding: 12px 5px; border-radius: 20px; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 20px; animation: slideUp 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-ans { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 15px; outline: none; font-size: 1rem; transition: 0.3s; }
        .input-ans:focus { border-color: var(--accent-solid); background: var(--surface-h); }
        .input-ans.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .input-ans.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 22px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 20px -5px rgba(99, 102, 241, 0.4); }
        .btn-main:active { transform: scale(0.96); }
        .btn-main.secondary { background: var(--surface-h); color: var(--text); box-shadow: none; border: 1px solid var(--border); }

        .item-row { background: var(--surface); padding: 20px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--border); transition: 0.3s; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .item-row:hover { transform: translateY(-3px); border-color: var(--accent-solid); background: var(--surface-h); }

        .side-picker { background: var(--surface); padding: 6px; border-radius: 20px; margin-bottom: 25px; display: flex; gap: 5px; border: 1px solid var(--border); }
        .side-option { flex: 1; padding: 10px; border-radius: 15px; cursor: pointer; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--muted); transition: 0.3s; }
        .side-option.active { background: var(--bg); color: var(--accent-solid); box-shadow: var(--shadow); }

        .study-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .study-card { background: var(--surface); padding: 30px 15px; border-radius: 28px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; text-align: center; }
        .study-card:hover { background: var(--accent); color: white; transform: translateY(-5px); }
        .study-card span { font-size: 2.2rem; }

        .card-scene { width: 100%; height: 380px; perspective: 1200px; margin-bottom: 30px; position: relative; }
        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; border-radius: 40px; border: 2px solid transparent; }
        .card-inner.flipped { transform: rotateY(180deg); }

        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 38px; display: flex; align-items: center; justify-content: center; padding: 35px; background: var(--surface); text-align: center; font-size: 1.8rem; font-weight: 800; border: 2px solid var(--border); box-shadow: var(--shadow); backdrop-filter: blur(15px); }
        .card-back { transform: rotateY(180deg); background: var(--accent); color: white; border: none; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(12px); }
        .modal { background: var(--surface-h); padding: 35px; border-radius: 35px; width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:12px; font-size: 1.4rem;"></h3>
        <p id="m-body" style="margin-bottom:25px; color:var(--muted); line-height: 1.5;"></p>
        <div id="m-content"></div>
        <div id="m-btns" style="display:flex; gap:12px; margin-top:20px;"></div>
    </div>
</div>

<header>
    <div class="logo">FLASHCLOUD</div>
    <div style="display:flex; gap:12px">
        <button class="nav-btn" style="padding:12px; border-radius: 50%; background: var(--surface); width:45px; height:45px;" onclick="toggleTheme()">🌓</button>
        <button id="logout-btn" class="nav-btn" style="padding:12px; border-radius: 50%; background: var(--surface); width:45px; height:45px; display:none" onclick="auth.signOut()">🚪</button>
    </div>
</header>

<div id="scr-auth" class="screen active">
    <div style="text-align:center; padding-top:60px">
        <h2 id="auth-title" style="font-size: 2rem; margin-bottom: 10px;">З поверненням!</h2>
        <p id="auth-subtitle" style="color: var(--muted); margin-bottom: 40px;">Увійдіть, щоб продовжити навчання</p>
        <input type="email" id="email" class="input-ans" placeholder="Email">
        <input type="password" id="pass" class="input-ans" placeholder="Пароль">
        <button class="btn-main" id="auth-submit-btn" onclick="handleAuth()">Продовжити</button>
        <p style="margin-top: 25px; color: var(--muted); font-size: 0.9rem;">
            <span id="auth-switch-text">Ще немає акаунта?</span> 
            <a href="#" id="auth-switch-link" style="color: var(--accent-solid); font-weight: 700; text-decoration: none;" onclick="toggleAuthMode()">Створити</a>
        </p>
    </div>
</div>

<div id="scr-folders" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h2 style="font-size: 1.6rem;">Модулі</h2>
        <button class="btn-main" style="width:auto; padding:12px 25px; border-radius: 18px;" onclick="uiAddFolder()">+ Створити</button>
    </div>
    <div id="folders-list"></div>
</div>

<div id="scr-editor" class="screen">
    <h2 id="editor-title" style="margin-bottom: 25px;">Слова</h2>
    <div style="background:var(--surface); padding:25px; border-radius:30px; margin-bottom:30px; border:1px solid var(--border);">
        <input type="text" id="in-w" class="input-ans" placeholder="Термін">
        <input type="text" id="in-t" class="input-ans" placeholder="Переклад">
        <button class="btn-main" onclick="addCard()">Додати картку</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu">
        <h2 id="study-title" style="margin-bottom: 10px;">Навчання</h2>
        <p style="color: var(--muted); margin-bottom: 25px;">Оберіть режим</p>
        <div class="side-picker">
            <div class="side-option active" id="s-term" onclick="setSide('term')">Термін</div>
            <div class="side-option" id="s-def" onclick="setSide('def')">Переклад</div>
            <div class="side-option" id="s-rand" onclick="setSide('rand')">Рандом</div>
        </div>
        <div class="study-grid">
            <div class="study-card" onclick="startMode('flip')"><span>🃏</span><b>Картки</b></div>
            <div class="study-card" onclick="startMode('learn')"><span>🧠</span><b>Вибір</b></div>
            <div class="study-card" onclick="startMode('write')"><span>⌨️</span><b>Письмо</b></div>
            <div class="study-card" onclick="startMode('test')"><span>📝</span><b>Тест</b></div>
        </div>
    </div>
    <div id="study-area" style="display:none">
        <div id="mode-container"></div>
    </div>
</div>

<nav id="nav-container" class="nav-bar">
    <button id="n-folders" class="nav-btn" onclick="nav('folders')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')">Вчити</button>
</nav>

<script>
    // КОНФІГ ТА АВТОРИЗАЦІЯ
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let curFid = null, deck = [], studyQueue = [], currentMistakes = [], idx = 0, currentMode = '', side = 'term';
    let isFlipped = false; 

    auth.onAuthStateChanged(user => {
        if(user) { document.getElementById('nav-container').style.display = 'flex'; nav('folders'); }
        else { document.getElementById('nav-container').style.display = 'none'; showScreen('scr-auth'); }
    });

    function nav(s) { if(!curFid && s!=='folders') return nav('folders'); showScreen('scr-'+s); if(s==='folders') loadFolders(); if(s==='editor') loadCards(); if(s==='study') { document.getElementById('study-menu').style.display='block'; document.getElementById('study-area').style.display='none'; } }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleAuthMode() { window.isLoginMode = !window.isLoginMode; document.getElementById('auth-title').innerText = window.isLoginMode ? "Вхід" : "Реєстрація"; }
    async function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; try { await auth.signInWithEmailAndPassword(e,p); } catch(err) { await auth.createUserWithEmailAndPassword(e,p); } }

    async function loadFolders() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').get();
        const list = document.getElementById('folders-list'); list.innerHTML = '';
        snap.forEach(doc => {
            list.innerHTML += `<div class="item-row" onclick="selectFolder('${doc.id}', '${doc.data().name}')"><b>${doc.data().name}</b></div>`;
        });
    }
    function uiAddFolder() { const n = prompt("Назва:"); if(n) db.collection('users').doc(auth.currentUser.uid).collection('folders').add({name:n, createdAt: Date.now()}).then(loadFolders); }
    async function selectFolder(id, name) { curFid = id; await loadCards(); nav('study'); }
    async function loadCards() {
        if(!curFid) return;
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        deck = []; snap.forEach(doc => deck.push({id: doc.id, ...doc.data()}));
        const list = document.getElementById('cards-list'); list.innerHTML = '';
        deck.forEach(c => { list.innerHTML += `<div class="item-row"><div>${c.term} - ${c.def}</div></div>`; });
    }
    function addCard() { const t=document.getElementById('in-w'), d=document.getElementById('in-t'); if(t.value && d.value) db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({term:t.value, def:d.value}).then(() => {t.value=''; d.value=''; loadCards();}); }

    function setSide(s) { side = s; document.querySelectorAll('.side-option').forEach(o => o.classList.remove('active')); document.getElementById('s-'+s).classList.add('active'); }

    function startMode(m, useMistakes = false) {
        studyQueue = useMistakes ? [...currentMistakes] : [...deck].sort(() => 0.5 - Math.random());
        if(studyQueue.length < 1) return alert("Мало слів!");
        currentMode = m; idx = 0; currentMistakes = [];
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        renderStep();
    }

    function renderStep() {
        const cont = document.getElementById('mode-container');
        if(idx >= studyQueue.length) {
            cont.innerHTML = `<div style="text-align:center; padding:40px"><h2>Готово! Помилок: ${currentMistakes.length}</h2><button class="btn-main" onclick="nav('study')">Меню</button></div>`;
            return;
        }
        
        // КРИТИЧНО: Скидаємо стан перевороту для нової картки
        isFlipped = false; 
        
        const card = studyQueue[idx];
        let term = card.term, def = card.def;
        if(side === 'def' || (side === 'rand' && Math.random() > 0.5)) [term, def] = [def, term];

        if(currentMode === 'flip') {
            cont.innerHTML = `
                <p style="text-align:center; color:var(--muted); margin-bottom:10px">${idx+1}/${studyQueue.length}</p>
                <div class="card-scene" id="swipe-zone">
                    <div class="card-inner" id="card-obj">
                        <div class="card-face">${term}</div>
                        <div class="card-face card-back">${def}</div>
                    </div>
                </div>
                <div style="display:flex; gap:10px">
                    <button class="btn-main secondary" onclick="handleFlipResult(false)">❌</button>
                    <button class="btn-main" style="background:var(--success)" onclick="handleFlipResult(true)">✅</button>
                </div>`;
            initSwipe();
        } else {
            cont.innerHTML = `<div style="text-align:center"><h2>${term}</h2><input type="text" id="q-in" class="input-ans" placeholder="Переклад..."><button class="btn-main" onclick="checkWrite('${def}')">Перевірити</button></div>`;
        }
    }

    function checkWrite(cor) {
        const val = document.getElementById('q-in').value.trim();
        if(val.toLowerCase() === cor.toLowerCase()) { idx++; renderStep(); }
        else { currentMistakes.push(studyQueue[idx]); alert("Правильно: " + cor); idx++; renderStep(); }
    }

    function initSwipe() {
        const zone = document.getElementById('swipe-zone'), card = document.getElementById('card-obj');
        let startX, startY, moveX = 0, isMoving = false;

        zone.onpointerdown = e => {
            startX = e.clientX; startY = e.clientY;
            card.style.transition = '0s';
            isMoving = false;
        };

        zone.onpointermove = e => {
            moveX = e.clientX - startX;
            let moveY = e.clientY - startY;
            if (Math.abs(moveX) > 10 || Math.abs(moveY) > 10) isMoving = true;
            
            if (isMoving) {
                let rotY = isFlipped ? 180 : 0;
                card.style.transform = `translateX(${moveX}px) rotate(${moveX/15}deg) rotateY(${rotY}deg)`;
            }
        };

        zone.onpointerup = e => {
            if (!isMoving) {
                // ПЕРЕВОРОТ (працює коректно завдяки скиданню isFlipped в renderStep)
                isFlipped = !isFlipped;
                card.style.transition = '0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                card.style.transform = `rotateY(${isFlipped ? 180 : 0}deg)`;
            } else {
                if (Math.abs(moveX) > 120) {
                    handleFlipResult(moveX > 0);
                } else {
                    card.style.transition = '0.3s';
                    card.style.transform = `rotateY(${isFlipped ? 180 : 0}deg)`;
                }
            }
            moveX = 0; // Скидаємо зміщення
        };
    }

    function handleFlipResult(known) {
        if(!known) currentMistakes.push(studyQueue[idx]);
        const card = document.getElementById('card-obj');
        if(!card) return;
        card.style.transition = '0.4s ease-in';
        card.style.transform = `translateX(${known ? 500 : -500}px) rotate(${known ? 45 : -45}deg) rotateY(${isFlipped ? 180 : 0}deg)`;
        card.style.opacity = '0';
        setTimeout(() => { idx++; renderStep(); }, 300);
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>
</body>
</html>
