<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlashCloud Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface-h: #334155;
            --text: #f8fafc; --muted: #94a3b8; --accent: #818cf8;
            --border: #334155; --danger: #ef4444; --success: #22c55e;
            --radius: 24px;
        }
        body.light-theme {
            --bg: #f8fafc; --surface: #ffffff; --surface-h: #f1f5f9;
            --text: #0f172a; --muted: #64748b; --accent: #4f46e5; --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; transition: 0.3s; overflow-x: hidden; }

        header { max-width: 500px; margin: 0 auto; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

        .nav-bar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 450px; 
            background: var(--surface); padding: 8px; border-radius: 24px; border: 1px solid var(--border);
            display: none; gap: 5px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); z-index: 1000;
        }
        .nav-btn { flex: 1; padding: 14px 5px; border-radius: 18px; border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { background: var(--bg); color: var(--accent); }

        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 20px; animation: fadeIn 0.3s ease-out; }
        .screen.active { display: block; }

        .item-row { background: var(--surface); padding: 20px; border-radius: var(--radius); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }

        .input-ans { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 15px; outline: none; font-size: 1rem; transition: 0.2s; }
        .input-ans:focus { border-color: var(--accent); }

        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 18px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-main.secondary { background: var(--surface-h); color: var(--text); }

        /* CARD DISPLAY MODE SELECTOR */
        .mode-selector { background: var(--surface); padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--border); }
        .mode-selector p { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; font-weight: 700; text-transform: uppercase; }
        .select-group { display: flex; gap: 8px; }
        .select-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .select-btn.active { border-color: var(--accent); background: var(--accent); color: white; }

        /* SWIPE CARD SYSTEM */
        .card-scene { width: 100%; height: 380px; perspective: 1000px; margin: 20px 0; position: relative; touch-action: none; }
        .card-inner { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), background 0.3s; 
            cursor: pointer; border-radius: 32px;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; inset: 0; backface-visibility: hidden; border-radius: 32px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; 
            background: var(--surface); text-align: center; font-size: 2rem; font-weight: 800; 
            border: 3px solid var(--border); transition: 0.3s;
        }
        .card-back { transform: rotateY(180deg); color: var(--accent); }

        .swipe-right .card-face { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .swipe-left .card-face { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(8px); }
        .modal { background: var(--surface); padding: 30px; border-radius: 32px; width: 100%; max-width: 400px; border: 1px solid var(--border); text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-bar" style="position:fixed; top:0; height:4px; background:var(--accent); width:0%; transition:0.4s; z-index:4000;"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:12px;"></h3>
        <div id="m-body" style="margin-bottom:25px; color:var(--muted);"></div>
        <div id="m-btns" style="display:flex; flex-direction: column; gap:10px"></div>
    </div>
</div>

<header>
    <div class="logo">FLASHCLOUD</div>
    <button class="nav-btn" style="padding:10px; border-radius: 50%; background: var(--surface);" onclick="toggleTheme()">🌓</button>
</header>

<div id="scr-auth" class="screen active">
    <div style="text-align:center; padding-top:40px">
        <h2>Вхід</h2>
        <input type="email" id="email" class="input-ans" placeholder="Email">
        <input type="password" id="pass" class="input-ans" placeholder="Пароль">
        <button class="btn-main" onclick="handleAuth('login')">Увійти</button>
    </div>
</div>

<div id="scr-folders" class="screen">
    <h2>Модулі</h2>
    <div id="folders-list"></div>
    <button class="btn-main" style="margin-top:20px" onclick="uiAddFolder()">+ Новий модуль</button>
</div>

<div id="scr-editor" class="screen">
    <h2>Слова</h2>
    <div style="background:var(--surface); padding:20px; border-radius:var(--radius); margin-bottom:20px; border:1px solid var(--border)">
        <input type="text" id="in-w" class="input-ans" placeholder="Термін">
        <input type="text" id="in-t" class="input-ans" placeholder="Переклад">
        <button class="btn-main" onclick="addCard()">Додати</button>
    </div>
    <div id="cards-list"></div>
</div>

<div id="scr-study" class="screen">
    <div id="study-menu">
        <h2>Вчити</h2>
        
        <div class="mode-selector">
            <p>Показувати спочатку:</p>
            <div class="select-group">
                <button class="select-btn active" id="mode-term" onclick="setSideMode('term')">Термін</button>
                <button class="select-btn" id="mode-def" onclick="setSideMode('def')">Переклад</button>
                <button class="select-btn" id="mode-rand" onclick="setSideMode('rand')">Рандом</button>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
            <button class="item-row" style="flex-direction:column; gap:10px; cursor:pointer" onclick="startMode('flip')">🃏 <b>Картки</b></button>
            <button class="item-row" style="flex-direction:column; gap:10px; cursor:pointer" onclick="startMode('learn')">🧠 <b>Заучування</b></button>
            <button class="item-row" style="flex-direction:column; gap:10px; cursor:pointer" onclick="startMode('write')">⌨️ <b>Письмо</b></button>
            <button class="item-row" style="flex-direction:column; gap:10px; cursor:pointer" onclick="startMode('test')">📝 <b>Тест</b></button>
        </div>
    </div>
    <div id="study-area" style="display:none">
        <div id="mode-container"></div>
    </div>
</div>

<nav id="nav-container" class="nav-bar">
    <button id="n-folders" class="nav-btn" onclick="nav('folders')">Модулі</button>
    <button id="n-editor" class="nav-btn" onclick="nav('editor')">Слова</button>
    <button id="n-study" class="nav-btn" onclick="nav('study')">Вчити</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDmgEKwNIUnXrvUsn6OTzjWBI_MIegPCHk",
        authDomain: "pet-project-90af1.firebaseapp.com",
        projectId: "pet-project-90af1",
        storageBucket: "pet-project-90af1.firebasestorage.app",
        messagingSenderId: "408900485418",
        appId: "1:408900485418:web:450d1665212044352e9e53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let curFid = null, deck = [], idx = 0, currentMode = '', sideMode = 'term', startX = 0;

    function setSideMode(m) {
        sideMode = m;
        document.querySelectorAll('.select-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + m).classList.add('active');
    }

    // --- UTILS ---
    function openPopup({title, body, confirmText = "OK", onConfirm, showCancel = true}) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-body').innerText = body;
        const btnCont = document.getElementById('m-btns');
        btnCont.innerHTML = '';
        const ok = document.createElement('button');
        ok.className = "btn-main"; ok.innerText = confirmText;
        ok.onclick = () => { if(onConfirm) onConfirm(); closePopup(); };
        btnCont.appendChild(ok);
        if(showCancel) {
            const no = document.createElement('button');
            no.className = "btn-main secondary"; no.innerText = "Скасувати";
            no.onclick = closePopup; btnCont.appendChild(no);
        }
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closePopup() { document.getElementById('modal-overlay').style.display = 'none'; }

    auth.onAuthStateChanged(user => {
        if(user) { document.getElementById('nav-container').style.display = 'flex'; nav('folders'); }
        else { document.getElementById('nav-container').style.display = 'none'; showScreen('scr-auth'); }
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }

    function nav(s) {
        if((s==='editor'||s==='study') && !curFid) return nav('folders');
        showScreen('scr-' + s);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('n-'+s).classList.add('active');
        if(s==='folders') loadFolders();
        if(s==='editor') loadCards();
        if(s==='study') { document.getElementById('study-menu').style.display='block'; document.getElementById('study-area').style.display='none'; }
    }

    async function loadFolders() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').get();
        const list = document.getElementById('folders-list'); list.innerHTML = '';
        snap.forEach(doc => {
            list.innerHTML += `<div class="item-row" onclick="curFid='${doc.id}'; nav('study')"><b>${doc.data().name}</b></div>`;
        });
    }

    async function loadCards() {
        const snap = await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').get();
        deck = []; snap.forEach(doc => { deck.push({id:doc.id, ...doc.data()}); });
        const list = document.getElementById('cards-list'); list.innerHTML = '';
        deck.forEach(c => list.innerHTML += `<div class="item-row"><b>${c.term}</b> — ${c.def}</div>`);
    }

    async function addCard() {
        const w = document.getElementById('in-w'), t = document.getElementById('in-t');
        if(!w.value || !t.value) return;
        await db.collection('users').doc(auth.currentUser.uid).collection('folders').doc(curFid).collection('cards').add({term:w.value, def:t.value});
        w.value=''; t.value=''; loadCards();
    }

    // --- CORE LOGIC ---
    function startMode(m) {
        if(deck.length < 1) return alert("Додайте слова!");
        currentMode = m; idx = 0;
        document.getElementById('study-menu').style.display = 'none';
        document.getElementById('study-area').style.display = 'block';
        renderStep();
    }

    function renderStep() {
        const cont = document.getElementById('mode-container');
        if(idx >= deck.length) {
            cont.innerHTML = `<div style="text-align:center"><h2>Готово! 🎉</h2><button class="btn-main" onclick="nav('study')">До меню</button></div>`;
            return;
        }
        const c = deck[idx];

        // Логіка визначення початкової сторони
        let faceA = c.term, faceB = c.def;
        if(sideMode === 'def') { faceA = c.def; faceB = c.term; }
        if(sideMode === 'rand') {
            if(Math.random() > 0.5) { faceA = c.def; faceB = c.term; }
        }
        
        if(currentMode === 'flip') {
            cont.innerHTML = `
                <div class="card-scene" id="swipe-zone">
                    <div class="card-inner" id="card-obj" onclick="this.classList.toggle('flipped')">
                        <div class="card-face"><div>${faceA}</div></div>
                        <div class="card-face card-back">${faceB}</div>
                    </div>
                </div>
            `;
            initSwipe();
        } else if(currentMode === 'write') {
            cont.innerHTML = `
                <h2 style="text-align:center">${faceA}</h2>
                <input type="text" id="w-input" class="input-ans" placeholder="Переклад..." autocomplete="off">
                <button class="btn-main" onclick="checkWrite('${faceB}')">Перевірити</button>
            `;
            setTimeout(() => document.getElementById('w-input').focus(), 100);
        }
    }

    function initSwipe() {
        const zone = document.getElementById('swipe-zone'), card = document.getElementById('card-obj');
        zone.addEventListener('touchstart', e => { startX = e.touches[0].clientX; card.style.transition = '0.1s'; });
        zone.addEventListener('touchmove', e => {
            let moveX = e.touches[0].clientX - startX;
            card.style.transform = `translateX(${moveX}px) rotate(${moveX/10}deg)` + (card.classList.contains('flipped') ? ' rotateY(180deg)' : '');
            zone.className = moveX > 50 ? 'card-scene swipe-right' : (moveX < -50 ? 'card-scene swipe-left' : 'card-scene');
        });
        zone.addEventListener('touchend', e => {
            let moveX = e.changedTouches[0].clientX - startX;
            card.style.transition = '0.4s';
            if(Math.abs(moveX) > 120) { card.style.opacity = '0'; setTimeout(() => { idx++; renderStep(); }, 300); }
            else { card.style.transform = card.classList.contains('flipped') ? 'rotateY(180deg)' : 'translate(0) rotate(0)'; zone.className = 'card-scene'; }
        });
    }

    function checkWrite(correct) {
        const user = document.getElementById('w-input').value.trim().toLowerCase();
        if(user === correct.toLowerCase()) { idx++; renderStep(); }
        else openPopup({title: "Помилка", body: `Правильно: ${correct}`, showCancel: false, onConfirm: () => { idx++; renderStep(); }});
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
</script>
</body>
</html>
